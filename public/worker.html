<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dairy Worker Panel</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family:Arial;
    background:#f1f5f9;
    padding:20px;
    margin:0;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    max-width:1100px;
    margin-left:auto;
    margin-right:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:2px solid #000;
    padding:12px;
    text-align:center;
    font-size:18px;
}

th{
    background:yellow;
}

input{
    width:100%;
    padding:10px;
    border:none;
    text-align:center;
    font-size:18px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.stats{
    display:grid;
    grid-template-columns:1fr 1fr 1fr 1fr;
    gap:15px;
}

.stat{
    background:#dbeafe;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

canvas{
    background:white;
    border-radius:15px;
    padding:10px;
}

.reportCard{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
    border:3px solid black;
}

.yellow{
    background:yellow;
    font-weight:bold;
}

@media(max-width:900px){

    .stats{
        grid-template-columns:1fr 1fr;
    }
}

</style>

</head>

<body>

<script>

if(
    localStorage.getItem("role")
    !== "worker"
){
    window.location = "/";
}

</script>

<div class="card">

<h1>🐄 Dairy Milk Entry</h1>

<table>

<tr>
<th colspan="4">
<input type="date" id="date">
</th>
</tr>

<tr>
<th></th>
<th>Milk AM</th>
<th>Milk PM</th>
<th>Total</th>
</tr>

<tr>

<td><b>Dairy</b></td>

<td>
<input
type="number"
id="dairyAM"
oninput="calculateTotals()"
>
</td>

<td>
<input
type="number"
id="dairyPM"
oninput="calculateTotals()"
>
</td>

<td id="dairyTotal">0</td>

</tr>

<tr>

<td><b>Staff</b></td>

<td>
<input
type="number"
id="staffAM"
oninput="calculateTotals()"
value="0"
>
</td>

<td>
<input
type="number"
id="staffPM"
oninput="calculateTotals()"
value="0"
>
</td>

<td id="staffTotal">0</td>

</tr>

<tr>

<td><b>Calf</b></td>

<td>
<input
type="number"
id="calfAM"
oninput="calculateTotals()"
value="0"
>
</td>

<td>
<input
type="number"
id="calfPM"
oninput="calculateTotals()"
value="0"
>
</td>

<td id="calfTotal">0</td>

</tr>

<tr>

<td><b>Discard</b></td>

<td colspan="2">

<input
type="number"
id="discardedMilk"
value="0"
oninput="calculateTotals()"
>

</td>

<td id="discardTotal">0</td>

</tr>

<tr class="yellow">

<td><b>TOTAL</b></td>

<td id="totalAM">0</td>

<td id="totalPM">0</td>

<td id="grandTotal">0</td>

</tr>

<tr>

<td><b>No Of Cows</b></td>

<td colspan="3">

<input
type="number"
id="cowCount"
>

</td>

</tr>

</table>

<button onclick="saveMilk()">
Save Milk Entry
</button>

<button onclick="shareTodayReport()">
Share Today Report
</button>

</div>

<div class="card">

<h2>Milk Analytics</h2>

<div class="stats">

<div class="stat">
<h3>Total Milk</h3>
<p id="dashboardMilk">0 L</p>
</div>

<div class="stat">
<h3>Total AM</h3>
<p id="dashboardAM">0 L</p>
</div>

<div class="stat">
<h3>Total PM</h3>
<p id="dashboardPM">0 L</p>
</div>

<div class="stat">
<h3>Discarded</h3>
<p id="dashboardDiscard">0 L</p>
</div>

</div>

<br><br>

<canvas id="milkChart"></canvas>

</div>

<div class="card">

<h2>Daily Records</h2>

<table>

<thead>

<tr>
<th>Date</th>
<th>AM</th>
<th>PM</th>
<th>Discard</th>
<th>Total</th>
<th>Cows</th>
</tr>

</thead>

<tbody id="records">
</tbody>

</table>

</div>

<script>

let milkChart;

function val(id){

    return Number(
        document.getElementById(id).value
    ) || 0;
}

function calculateTotals(){

    const dairyAM =
        val("dairyAM");

    const dairyPM =
        val("dairyPM");

    const staffAM =
        val("staffAM");

    const staffPM =
        val("staffPM");

    const calfAM =
        val("calfAM");

    const calfPM =
        val("calfPM");

    const discard =
        val("discardedMilk");

    const dairyTotal =
        dairyAM + dairyPM;

    const staffTotal =
        staffAM + staffPM;

    const calfTotal =
        calfAM + calfPM;

    const totalAM =
        dairyAM +
        staffAM +
        calfAM;

    const totalPM =
        dairyPM +
        staffPM +
        calfPM;

    const grandTotal =
        totalAM +
        totalPM -
        discard;

    document.getElementById(
        "dairyTotal"
    ).innerText =
        dairyTotal.toFixed(1);

    document.getElementById(
        "staffTotal"
    ).innerText =
        staffTotal.toFixed(1);

    document.getElementById(
        "calfTotal"
    ).innerText =
        calfTotal.toFixed(1);

    document.getElementById(
        "discardTotal"
    ).innerText =
        discard.toFixed(1);

    document.getElementById(
        "totalAM"
    ).innerText =
        totalAM.toFixed(1);

    document.getElementById(
        "totalPM"
    ).innerText =
        totalPM.toFixed(1);

    document.getElementById(
        "grandTotal"
    ).innerText =
        grandTotal.toFixed(1);

    return {

        totalAM,
        totalPM,
        grandTotal,
        discard
    };
}

async function saveMilk(){

    const calc =
        calculateTotals();

    const data = {

        type:"milk",

        date:
            document.getElementById(
                "date"
            ).value,

        milkAM:
            calc.totalAM,

        milkPM:
            calc.totalPM,

        discardedMilk:
            calc.discard,

        dailyMilk:
            calc.grandTotal,

        cows:
            val("cowCount")
    };

    await fetch("/add",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(data)
    });

    alert(
        "Milk Entry Saved ✅"
    );

    loadDashboard();
}

async function shareTodayReport(){

    const text = `

🐄 DAIRY REPORT

Date:
${document.getElementById("date").value}

AM Milk:
${document.getElementById("totalAM").innerText}

PM Milk:
${document.getElementById("totalPM").innerText}

Total Milk:
${document.getElementById("grandTotal").innerText}

Discarded:
${document.getElementById("discardTotal").innerText}

No Of Cows:
${val("cowCount")}

`;

    if(navigator.share){

        navigator.share({

            title:"Dairy Report",

            text:text
        });

    }else{

        alert(text);
    }
}

async function loadDashboard(){

    const currentMonth =
        new Date()
        .toISOString()
        .slice(0,7);

    const res =
        await fetch(
            "/dashboard?month=" +
            currentMonth
        );

    const d =
        await res.json();

    document.getElementById(
        "dashboardMilk"
    ).innerText =
        Number(
            d.totalMilk || 0
        ).toFixed(1) + " L";

    document.getElementById(
        "dashboardAM"
    ).innerText =
        Number(
            d.totalAMMilk || 0
        ).toFixed(1) + " L";

    document.getElementById(
        "dashboardPM"
    ).innerText =
        Number(
            d.totalPMMilk || 0
        ).toFixed(1) + " L";

    document.getElementById(
        "dashboardDiscard"
    ).innerText =
        Number(
            d.totalDiscardedMilk || 0
        ).toFixed(1) + " L";

    const labels = [];
    const milkData = [];

    const table =
        document.getElementById(
            "records"
        );

    table.innerHTML = "";

    (d.records || []).forEach(r => {

        labels.push(r.date);

        milkData.push(r.dailyMilk);

        table.innerHTML += `

        <tr>

        <td>${r.date}</td>

        <td>${Number(
            r.milkAM || 0
        ).toFixed(1)}</td>

        <td>${Number(
            r.milkPM || 0
        ).toFixed(1)}</td>

        <td>${Number(
            r.discardedMilk || 0
        ).toFixed(1)}</td>

        <td>${Number(
            r.dailyMilk || 0
        ).toFixed(1)}</td>

        <td>${Number(
            r.cows || 0
        )}</td>

        </tr>
        `;
    });

    if(milkChart){
        milkChart.destroy();
    }

    milkChart =
        new Chart(

        document.getElementById(
            "milkChart"
        ),

        {

            type:"line",

            data:{

                labels:labels,

                datasets:[{

                    label:"Milk Production",

                    data:milkData
                }]
            }
        });
}

loadDashboard();

</script>

</body>
</html>
