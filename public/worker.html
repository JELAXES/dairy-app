<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Kshiralaya Manager
</title>

<style>
@media (max-width:900px){

    body{
        display:block;
        overflow-x:hidden;
    }

    .sidebar{

        width:100%;

        display:flex;

        flex-direction:row;

        align-items:center;

        gap:8px;

        padding:10px;

        overflow-x:auto;

        position:sticky;

        top:0;

        z-index:1000;

        background:#111827;
    }

    .logoBox{
        display:none;
    }

    .sideBtn{

        min-width:110px;

        padding:12px;

        font-size:14px;

        white-space:nowrap;

        flex-shrink:0;
    }

    .main{

        margin-left:0 !important;

        width:100%;

        padding:12px;
    }

    .card{

        width:100%;

        padding:15px;

        margin-bottom:15px;
    }

    .grid{

        display:grid;

        grid-template-columns:1fr !important;

        gap:12px;
    }

    input,
    select{

        width:100%;

        padding:14px;

        font-size:16px;
    }

    button{

        width:100%;

        padding:14px;

        font-size:16px;
    }

    h1{

        font-size:32px;
    }

    h2{

        font-size:26px;
    }

    table{

        display:block;

        width:100%;

        overflow-x:auto;

        white-space:nowrap;
    }

    th,
    td{

        font-size:13px;

        padding:10px;
    }

    .remarkItem{

        width:100%;
    }
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#0b1120;
    color:white;
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */

.sidebar{
    width: 200px;
    background:#111827;
    padding:18px;
    display:flex;
    flex-direction:column;
}

.logoBox{
    text-align:center;
    margin-bottom:28px;
}

.logoBox img{
    width:120px;
    border-radius:20px;
    margin-bottom:10px;
}

.logoText{
    font-size:24px;
    font-weight:bold;

    background:linear-gradient(
        90deg,
        #60a5fa,
        #a855f7
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.sideBtn{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
    cursor:pointer;
    text-align:left;
    font-size:14px;
}

.sideBtn:hover{
    background:#2563eb;
}

.activeBtn{
    background:linear-gradient(
        90deg,
        #3b82f6,
        #8b5cf6
    );
}

/* MAIN */

.main{
    flex:1;
    padding:20px;
    overflow-y:auto;
}

.card{
    background:#111827;
    border-radius:16px;
    padding:16px;
    margin-bottom:20px;
}

.card h2{
    margin-bottom:14px;
    font-size:22px;
}

.grid{
    display:grid;
    grid-template-columns:
    1fr 1fr;
    gap:16px;
}

input,
select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
    font-size:14px;
}

button{
    width:100%;
    padding:10px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(
        90deg,
        #3b82f6,
        #8b5cf6
    );
    color:white;
    cursor:pointer;
    font-size:14px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:16px;
}

th,td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #374151;
}

th{
    color:#60a5fa;
    font-size:14px;
}

td{
    font-size:14px;
}

.hidden{
    display:none;
}

.deleteBtn{
    background:#dc2626;
    margin-top:8px;
}

.remarkItem{
    background:#1e293b;
    padding:12px;
    border-radius:10px;
    margin-top:10px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logoBox">

<img src="logo.png">

<div class="logoText">
Kshiralaya
</div>

</div>

<button
class="sideBtn activeBtn"
onclick="showSection('milkSection',this)"
>
Milk Entry
</button>

<button
class="sideBtn"
onclick="showSection('recordsSection',this)"
>
Records
</button>

<button
class="sideBtn"
onclick="logout()"
>
Logout
</button>

</div>

<!-- MAIN -->

<div class="main">

<!-- MILK SECTION -->

<div id="milkSection">

<div class="card">

<h2>
Milk Entry
</h2>

<div class="grid">

<div>

<select id="milkClient">

<option value="">
Select Client
</option>

</select>

</div>

<div>

<input
type="date"
id="milkDate"
/>

</div>

<div>

<input
type="number"
id="milkAM"
placeholder="AM Milk"
/>

</div>

<div>

<input
type="number"
id="milkPM"
placeholder="PM Milk"
/>

</div>

<div>

<input
type="number"
id="discardMilk"
placeholder="Discard Milk"
/>

</div>

<div>

<input
type="number"
id="cowCount"
placeholder="Cow Count"
/>

</div>

<div>

<input
type="number"
id="calfCount"
placeholder="Calf Count"
/>

</div>

<div>

<input
type="number"
id="staffCount"
placeholder="Staff Count"
/>

</div>

</div>

<button onclick="saveMilk()">
Save Milk Entry
</button>

</div>

<!-- MANAGER REMARKS -->

<div class="card">

<h2>
Manager Remarks
</h2>

<input
type="text"
id="remarkInput"
placeholder="Write manager remark..."
/>

<button onclick="saveRemark()">
Share Remark
</button>

<div
id="remarksList"
style="margin-top:18px;"
>

</div>

</div>

</div>

<!-- RECORDS -->

<div
id="recordsSection"
class="hidden"
>

<div class="card">

<h2>
Milk Records
</h2>

<table>

<thead>

<tr>

<th>Date</th>
<th>Client</th>
<th>AM</th>
<th>PM</th>
<th>Discard</th>
<th>Total</th>
<th>Cows</th>
<th>Calves</th>
<th>Staff</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="milkRecords">

</tbody>

</table>

</div>

</div>

</div>

<script>

if(!localStorage.getItem("username")){

    window.location = "/";
}

// ======================
// SWITCH SECTION
// ======================

function showSection(id,btn){

    document
    .querySelectorAll(".main > div")
    .forEach(sec => {

        sec.classList.add(
            "hidden"
        );
    });

    document
    .getElementById(id)
    .classList.remove(
        "hidden"
    );

    document
    .querySelectorAll(".sideBtn")
    .forEach(b => {

        b.classList.remove(
            "activeBtn"
        );
    });

    btn.classList.add(
        "activeBtn"
    );

    if(id === "recordsSection"){

        loadMilkRecords();
    }
}

// ======================
// LOGOUT
// ======================

function logout(){

    localStorage.clear();

    window.location = "/";
}

// ======================
// AUTO DATE
// ======================

document.getElementById(
    "milkDate"
).value =
new Date()
.toISOString()
.split("T")[0];

// ======================
// LOAD CLIENTS
// ======================

async function loadClients(){

    const res =
    await fetch("/clients");

    const clients =
    await res.json();

    const select =
    document.getElementById(
        "milkClient"
    );

    select.innerHTML = `

    <option value="">
    Select Client
    </option>
    `;

    clients.forEach(c => {

        select.innerHTML += `

        <option value="${c.name}">
        ${c.name}
        </option>
        `;
    });
}

// ======================
// SAVE MILK
// ======================

async function saveMilk(){

    const client =
    document.getElementById(
        "milkClient"
    ).value;

    if(!client){

        alert(
            "Select Client"
        );

        return;
    }

    const milkAM =
    Number(
        document.getElementById(
            "milkAM"
        ).value
    ) || 0;

    const milkPM =
    Number(
        document.getElementById(
            "milkPM"
        ).value
    ) || 0;

    const data = {

        type:"milk",

        client,

        worker:
        localStorage.getItem(
            "username"
        ) || "Manager",

        date:
        document.getElementById(
            "milkDate"
        ).value,

        milkAM,

        milkPM,

        discardedMilk:Number(
            document.getElementById(
                "discardMilk"
            ).value
        ) || 0,

        cows:Number(
            document.getElementById(
                "cowCount"
            ).value
        ) || 0,

        calves:Number(
            document.getElementById(
                "calfCount"
            ).value
        ) || 0,

        staff:Number(
            document.getElementById(
                "staffCount"
            ).value
        ) || 0,

        dailyMilk:
        milkAM + milkPM
    };

    await fetch("/add",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify(data)
    });

    alert(
        "Milk Entry Saved ✅"
    );

    document.getElementById(
        "milkAM"
    ).value = "";

    document.getElementById(
        "milkPM"
    ).value = "";

    document.getElementById(
        "discardMilk"
    ).value = "";

    document.getElementById(
        "cowCount"
    ).value = "";

    document.getElementById(
        "calfCount"
    ).value = "";

    document.getElementById(
        "staffCount"
    ).value = "";

    loadMilkRecords();
}

// ======================
// LOAD RECORDS
// ======================

async function loadMilkRecords(){

    const res =
    await fetch("/dashboard");

    const data =
    await res.json();

    const tbody =
    document.getElementById(
        "milkRecords"
    );

    tbody.innerHTML = "";

    data.records.forEach(r => {

        tbody.innerHTML += `

        <tr>

        <td>${r.date || ""}</td>

        <td>${r.client || ""}</td>

        <td>${r.milkAM || 0}</td>

        <td>${r.milkPM || 0}</td>

        <td>${r.discardedMilk || 0}</td>

        <td>${r.dailyMilk || 0}</td>

        <td>${r.cows || 0}</td>

        <td>${r.calves || 0}</td>

        <td>${r.staff || 0}</td>

        <td>

        <button
        onclick="editMilk('${r._id}')"
        >
        Edit
        </button>

        <button
        class="deleteBtn"
        onclick="deleteMilk('${r._id}')"
        >
        Delete
        </button>

        </td>

        </tr>
        `;
    });
}

// ======================
// EDIT MILK
// ======================

async function editMilk(id){

    const am =
    prompt("AM Milk");

    const pm =
    prompt("PM Milk");

    const discard =
    prompt("Discard");

    if(!am || !pm) return;

    await fetch("/edit-milk",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({

            id,

            milkAM:Number(am),

            milkPM:Number(pm),

            discardedMilk:Number(discard),

            dailyMilk:
            Number(am) +
            Number(pm)
        })
    });

    loadMilkRecords();
}

// ======================
// DELETE MILK
// ======================

async function deleteMilk(id){

    const sure =
    confirm(
        "Delete Milk Entry?"
    );

    if(!sure) return;

    await fetch("/delete-milk",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({
            id
        })
    });

    loadMilkRecords();
}

// ======================
// SAVE REMARK
// ======================

async function saveRemark(){

    const text =
    document.getElementById(
        "remarkInput"
    ).value;

    if(!text){

        alert(
            "Enter a remark"
        );

        return;
    }

    await fetch("/save-remark",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({

            text:
            localStorage.getItem(
                "username"
            ) +
            ": " +
            text
        })
    });

    document.getElementById(
        "remarkInput"
    ).value = "";

    loadRemarks();
}

// ======================
// LOAD REMARKS
// ======================

async function loadRemarks(){

    const res =
    await fetch("/remarks");

    const remarks =
    await res.json();

    const list =
    document.getElementById(
        "remarksList"
    );

    list.innerHTML = "";

    remarks.forEach(r => {

        list.innerHTML += `

        <div class="remarkItem">

        ${r.text}

        </div>
        `;
    });
}

// ======================
// INIT
// ======================

loadClients();
loadMilkRecords();
loadRemarks();

</script>

</body>

</html>
