<script>

if(!localStorage.getItem("username")){

    window.location = "/";
}

let clientsCache = [];
let lastSlipData = null;

// ======================
// SWITCH SECTION
// ======================

function showSection(id,btn){

    document
    .querySelectorAll(".main > div")
    .forEach(sec => {

        sec.classList.add(
            "hidden"
        );
    });

    document
    .getElementById(id)
    .classList.remove(
        "hidden"
    );

    document
    .querySelectorAll(".sideBtn")
    .forEach(b => {

        b.classList.remove(
            "activeBtn"
        );
    });

    btn.classList.add(
        "activeBtn"
    );

    if(id === "recordsSection"){

        loadMilkRecords();
    }
}

// ======================
// LOGOUT
// ======================

function logout(){

    localStorage.clear();

    window.location = "/";
}

// ======================
// AUTO DATE
// ======================

document.getElementById(
    "milkDate"
).value =
new Date()
.toISOString()
.split("T")[0];

// ======================
// LOAD CLIENTS
// ======================

async function loadClients(){

    const res =
    await fetch("/clients");

    const clients =
    await res.json();

    clientsCache = Array.isArray(clients) ? clients : [];

    const select =
    document.getElementById(
        "milkClient"
    );

    select.innerHTML = `

    <option value="">
    Select Client
    </option>
    `;

    clientsCache.forEach(c => {

        select.innerHTML += `

        <option value="${c.name}">
        ${c.name}
        </option>
        `;
    });

    updateInvoicePreview();
}

function selectedClient(){
    const name = document.getElementById("milkClient").value;
    return clientsCache.find(c => c.name === name) || null;
}

function money(value){
    return `₹${Number(value || 0).toLocaleString("en-IN", {
        minimumFractionDigits:2,
        maximumFractionDigits:2
    })}`;
}

function numberWordsBelowLakh(num){
    const ones = ["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
    const tens = ["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
    const n = Math.floor(Number(num || 0));
    if(n === 0) return "Zero";
    if(n < 20) return ones[n];
    if(n < 100) return `${tens[Math.floor(n / 10)]} ${ones[n % 10]}`.trim();
    if(n < 1000) return `${ones[Math.floor(n / 100)]} Hundred ${numberWordsBelowLakh(n % 100)}`.trim();
    if(n < 100000) return `${numberWordsBelowLakh(Math.floor(n / 1000))} Thousand ${numberWordsBelowLakh(n % 1000)}`.trim();
    return String(n);
}

function invoiceTotals(){
    const milkAM = Number(document.getElementById("milkAM").value || 0);
    const milkPM = Number(document.getElementById("milkPM").value || 0);
    const liters = milkAM + milkPM;
    const rate = Number(selectedClient()?.pricePerLiter || 0);
    const amount = liters * rate;

    return { milkAM, milkPM, liters, rate, amount };
}

function currentSlipData(){
    const totals = invoiceTotals();
    const clientObj = selectedClient();

    return {
        client: clientObj?.name || document.getElementById("milkClient").selectedOptions[0]?.text || "",
        date: document.getElementById("milkDate").value,
        milkAM: totals.milkAM,
        milkPM: totals.milkPM,
        liters: totals.liters,
        rate: totals.rate,
        amount: totals.amount,
        itemCode: "",
        discard: document.getElementById("discardMilk").value || 0,
        cows: document.getElementById("cowCount").value || 0,
        calfMilk: document.getElementById("calfMilk").value || 0,
        staffMilk: document.getElementById("staffMilk").value || 0,
        remark: document.getElementById("remarkInput").value || ""
    };
}

function updateInvoicePreview(){
    const totals = invoiceTotals();
    const previewLiters = totals.liters > 0 ? totals.liters : Number(lastSlipData?.liters || 0);
    const previewDate = totals.liters > 0 ? document.getElementById("milkDate").value : (lastSlipData?.date || document.getElementById("milkDate").value);

    document.getElementById("previewDate").innerText = previewDate || "-";
    document.getElementById("previewItemCode").innerText = totals.liters > 0 ? "Save first" : (lastSlipData?.itemCode || "Save first");
    document.getElementById("previewLiters").innerText = `${previewLiters.toFixed(2)} L`;
}

// ======================
// SAVE MILK
// ======================

async function saveMilk(){

    const client =
    document.getElementById(
        "milkClient"
    ).value;

    if(!client){

        alert(
            "Select Client"
        );

        return;
    }

    const milkAM =
    Number(
        document.getElementById(
            "milkAM"
        ).value
    ) || 0;

    const milkPM =
    Number(
        document.getElementById(
            "milkPM"
        ).value
    ) || 0;

    if(milkAM + milkPM <= 0){

        alert(
            "Enter milk liters"
        );

        return;
    }

    const data = {

        type:"milk",

        client,

        worker:
        localStorage.getItem(
            "username"
        ) || "Manager",

        date:
        document.getElementById(
            "milkDate"
        ).value,

        milkAM,

        milkPM,

        discardedMilk:Number(
            document.getElementById(
                "discardMilk"
            ).value
        ) || 0,

        cows:Number(
            document.getElementById(
                "cowCount"
            ).value
        ) || 0,

        calfMilk:Number(
            document.getElementById(
                "calfMilk"
            ).value
        ) || 0,

        staffMilk:Number(
            document.getElementById(
                "staffMilk"
            ).value
        ) || 0,

        dailyMilk:
        milkAM + milkPM
    };

    const res =
    await fetch("/add",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify(data)
    });

    const saved =
    await res.json();

    if(!saved.success){

        alert(
            saved.message || "Could not save milk entry"
        );

        return;
    }

    lastSlipData = {
        ...currentSlipData(),
        itemCode: saved.entry?.itemCode || ""
    };

    alert(
        "Milk Entry Saved ✅"
    );

    document.getElementById(
        "milkAM"
    ).value = "";

    document.getElementById(
        "milkPM"
    ).value = "";

    document.getElementById(
        "discardMilk"
    ).value = "";

    document.getElementById(
        "cowCount"
    ).value = "";

    document.getElementById(
        "calfMilk"
    ).value = "";

    document.getElementById(
        "staffMilk"
    ).value = "";

    loadMilkRecords();
    updateInvoicePreview();
}

// ======================
// LOAD RECORDS
// ======================

async function loadMilkRecords(){

    const res =
    await fetch("/dashboard");

    const data =
    await res.json();

    const tbody =
    document.getElementById(
        "milkRecords"
    );

    tbody.innerHTML = "";

    data.records.forEach(r => {

        tbody.innerHTML += `

        <tr>

        <td>${r.date || ""}</td>

        <td>${r.client || ""}</td>

        <td>${r.milkAM || 0}</td>

        <td>${r.milkPM || 0}</td>

        <td>${r.discardedMilk || 0}</td>

        <td>${r.dailyMilk || 0}</td>

        <td>${r.cows || 0}</td>

        <td>${r.calfMilk || 0}</td>

        <td>${r.staffMilk || 0}</td>

        <td>

        <button
        onclick="editMilk('${r._id}')"
        >
        Edit
        </button>

        <button
        class="deleteBtn"
        onclick="deleteMilk('${r._id}')"
        >
        Delete
        </button>

        </td>

        </tr>
        `;
    });
}

// ======================
// EDIT MILK
// ======================

async function editMilk(id){

    const am =
    prompt("AM Milk");

    const pm =
    prompt("PM Milk");

    const discard =
    prompt("Discard");

    if(!am || !pm) return;

    await fetch("/edit-milk",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({

            id,

            milkAM:Number(am),

            milkPM:Number(pm),

            discardedMilk:Number(discard),

            dailyMilk:
            Number(am) +
            Number(pm)
        })
    });

    loadMilkRecords();
}

// ======================
// DELETE MILK
// ======================

async function deleteMilk(id){

    const sure =
    confirm(
        "Delete Milk Entry?"
    );

    if(!sure) return;

    await fetch("/delete-milk",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({
            id
        })
    });

    loadMilkRecords();
}

// ======================
// SAVE REMARK
// ======================

async function saveRemark(){

    const text =
    document.getElementById(
        "remarkInput"
    ).value;

    if(!text){

        alert(
            "Enter a remark"
        );

        return;
    }

    await fetch("/save-remark",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({

            text:
            localStorage.getItem(
                "username"
            ) +
            ": " +
            text
        })
    });

    document.getElementById(
        "remarkInput"
    ).value = "";

    loadRemarks();
}

// ======================
// LOAD REMARKS
// ======================

async function loadRemarks(){

    const res =
    await fetch("/remarks");

    const remarks =
    await res.json();

    const list =
    document.getElementById(
        "remarksList"
    );

    list.innerHTML = "";

    remarks.forEach(r => {

        list.innerHTML += `

        <div class="remarkItem">

        ${r.text}

        </div>
        `;
    });
}
// ======================
// SHARE REPORT
// ======================

async function shareMilkReport(){
    const currentData = currentSlipData();
    const slip = lastSlipData;
    const client = slip?.client || "";

    if(!currentData.liters && !slip){
        alert("Enter milk liters before making the PDF slip");
        return;
    }

    if(!slip || !slip.itemCode){
        alert("Save Milk Entry first so an item code can be created");
        return;
    }

    const report = document.createElement("div");

    report.style.background = "white";
    report.style.color = "#111827";
    report.style.padding = "18px";
    report.style.width = "900px";
    report.style.fontFamily = "Arial, sans-serif";
    report.style.fontSize = "12px";
    report.style.lineHeight = "1.35";
    report.style.position = "fixed";
    report.style.left = "-10000px";
    report.style.top = "0";

    const slipRate = Number(slip.rate || 0);
    const slipLiters = Number(slip.liters || 0);
    const slipTotal = slipRate * slipLiters;

    function fmtAmt(v){ return Number(v).toLocaleString("en-IN", {minimumFractionDigits:2, maximumFractionDigits:2}); }
    function fmtDate(d){ if(!d) return "-"; const p = String(d).split("-"); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d; }
    function amountToWords(total){
        const n = Math.round(Number(total||0));
        if(n===0) return "Zero Rupees only";
        function b100(x){const o=["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"],t=["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];return x<20?o[x]:`${t[Math.floor(x/10)]} ${o[x%10]}`.trim();}
        function b1000(x){return x<100?b100(x):`${b100(Math.floor(x/100))} Hundred ${b100(x%100)}`.trim();}
        let rem=n,parts=[];
        if(rem>=10000000){parts.push(b1000(Math.floor(rem/10000000))+" Crore");rem%=10000000;}
        if(rem>=100000){parts.push(b1000(Math.floor(rem/100000))+" Lakh");rem%=100000;}
        if(rem>=1000){parts.push(b1000(Math.floor(rem/1000))+" Thousand");rem%=1000;}
        if(rem>0){parts.push(b1000(rem));}
        return parts.join(" ")+" Rupees only";
    }

    report.innerHTML = `
    <div style="border:1px solid #222;">
        <div style="display:grid;grid-template-columns:120px 1fr 220px;border-bottom:1px solid #222;align-items:center;">
            <div style="padding:10px;text-align:center;">
                <img src="logo.png" style="width:92px;height:92px;object-fit:contain;">
            </div>
            <div style="padding:10px;text-align:center;">
                <h1 style="font-size:24px;margin:0;">TAX INVOICE</h1>
                <div style="font-size:18px;font-weight:bold;margin-top:6px;">KSHIRALAYA</div>
                <div>Pure Care Pure Milk</div>
            </div>
            <div style="padding:10px;border-left:1px solid #222;">
                <div><b>Invoice No:</b></div>
                <div><b>Invoice Date:</b> ${fmtDate(slip.date)}</div>
                <div><b>Credit Note No.:</b></div>
                <div><b>Credit Note Date:</b></div>
            </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #222;">
            <div style="padding:10px;border-right:1px solid #222;">

    const imgData = canvas.toDataURL("image/png");
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    const scale = Math.min((pageWidth - 12) / canvas.width, (pageHeight - 12) / canvas.height);
    const imgWidth = canvas.width * scale;
    const imgHeight = canvas.height * scale;
    const left = (pageWidth - imgWidth) / 2;
    const top = (pageHeight - imgHeight) / 2;

    pdf.addImage(imgData, "PNG", left, top, imgWidth, imgHeight);
