<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manager Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial;

    background:#0f172a;

    color:white;

    display:flex;

    min-height:100vh;
}

/* SIDEBAR */

.sidebar{

    width:260px;

    background:#111827;

    padding:25px;

    display:flex;

    flex-direction:column;
}

.logo{

    font-size:28px;

    font-weight:bold;

    margin-bottom:40px;

    background:linear-gradient(
        90deg,
        #60a5fa,
        #a855f7
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.sideBtn{

    width:100%;

    padding:15px;

    margin-bottom:15px;

    border:none;

    border-radius:12px;

    background:#1e293b;

    color:white;

    cursor:pointer;

    text-align:left;

    font-size:15px;

    transition:0.2s;
}

.sideBtn:hover{

    background:#2563eb;
}

.activeBtn{

    background:linear-gradient(
        90deg,
        #3b82f6,
        #8b5cf6
    );
}

/* MAIN */

.main{

    flex:1;

    padding:25px;

    overflow-y:auto;
}

.topBar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:25px;
}

.userCard{

    background:#111827;

    padding:18px;

    border-radius:15px;
}

.card{

    background:#111827;

    border-radius:18px;

    padding:20px;

    margin-bottom:25px;
}

.grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:20px;
}

.stats{

    display:grid;

    grid-template-columns:
    repeat(4,1fr);

    gap:15px;
}

.stat{

    background:#1e293b;

    padding:20px;

    border-radius:15px;

    text-align:center;
}

.stat h3{

    color:#94a3b8;

    margin-bottom:10px;
}

.stat p{

    font-size:26px;

    font-weight:bold;
}

input,
select{

    width:100%;

    padding:14px;

    margin-top:12px;

    border:none;

    border-radius:12px;

    background:#1e293b;

    color:white;
}

button{

    width:100%;

    padding:14px;

    margin-top:18px;

    border:none;

    border-radius:12px;

    background:linear-gradient(
        90deg,
        #3b82f6,
        #8b5cf6
    );

    color:white;

    cursor:pointer;

    font-size:16px;
}

table{

    width:100%;

    border-collapse:collapse;

    margin-top:20px;
}

th,td{

    padding:14px;

    text-align:center;

    border-bottom:1px solid #374151;
}

th{

    color:#60a5fa;
}

canvas{

    background:#1e293b;

    border-radius:15px;

    padding:15px;

    max-height:250px !important;

    width:100% !important;
}

.hidden{

    display:none;
}

@media(max-width:900px){

    body{

        flex-direction:column;
    }

    .sidebar{

        width:100%;
    }

    .stats{

        grid-template-columns:
        1fr 1fr;
    }

    .grid{

        grid-template-columns:
        1fr;
    }
}

</style>

</head>

<body>

<script>

if(
    localStorage.getItem("role")
    !== "worker"
){
    window.location = "/";
}

</script>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
🐄 Dairy ERP
</div>

<button
class="sideBtn activeBtn"
onclick="showSection('dashboardSection',this)"
>
Dashboard
</button>

<button
class="sideBtn"
onclick="showSection('milkSection',this)"
>
Milk Entry
</button>

<button
class="sideBtn"
onclick="showSection('recordsSection',this)"
>
Records
</button>

<button
class="sideBtn"
onclick="logout()"
>
Logout
</button>

</div>

<!-- MAIN -->

<div class="main">

<div class="topBar">

<div>

<h1>
👨‍💼 Manager Dashboard
</h1>

<p id="managerInfo"></p>

</div>

<div class="userCard">

<p>
Permissions
</p>

<h3 id="permissionInfo"></h3>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboardSection">

<div class="stats">

<div class="stat">

<h3>Total Milk</h3>

<p id="dashboardMilk">
0L
</p>

</div>

<div class="stat">

<h3>AM Milk</h3>

<p id="dashboardAM">
0L
</p>

</div>

<div class="stat">

<h3>PM Milk</h3>

<p id="dashboardPM">
0L
</p>

</div>

<div class="stat">

<h3>Discarded</h3>

<p id="dashboardDiscard">
0L
</p>

</div>

</div>

<br>

<div class="card">

<h2>
Milk Analytics
</h2>

<br>

<canvas id="milkChart"></canvas>

</div>

</div>

<!-- MILK ENTRY -->

<div
id="milkSection"
class="hidden"
>

<div class="card">

<h2>
🐄 Milk Entry
</h2>

<select id="clientSelect">

<option value="">
Select Client
</option>

</select>

<input
type="date"
id="date"
>

<div class="grid">

<div>

<label>Dairy AM</label>

<input
type="number"
id="dairyAM"
oninput="calculateTotals()"
>

</div>

<div>

<label>Dairy PM</label>

<input
type="number"
id="dairyPM"
oninput="calculateTotals()"
>

</div>

<div>

<label>Staff AM</label>

<input
type="number"
id="staffAM"
value="0"
oninput="calculateTotals()"
>

</div>

<div>

<label>Staff PM</label>

<input
type="number"
id="staffPM"
value="0"
oninput="calculateTotals()"
>

</div>

<div>

<label>Calf AM</label>

<input
type="number"
id="calfAM"
value="0"
oninput="calculateTotals()"
>

</div>

<div>

<label>Calf PM</label>

<input
type="number"
id="calfPM"
value="0"
oninput="calculateTotals()"
>

</div>

<div>

<label>Discarded Milk</label>

<input
type="number"
id="discardedMilk"
value="0"
oninput="calculateTotals()"
>

</div>

<div>

<label>No Of Cows</label>

<input
type="number"
id="cowCount"
>

</div>

</div>

<br>

<div class="stats">

<div class="stat">

<h3>Total AM</h3>

<p id="totalAM">
0
</p>

</div>

<div class="stat">

<h3>Total PM</h3>

<p id="totalPM">
0
</p>

</div>

<div class="stat">

<h3>Discard</h3>

<p id="discardTotal">
0
</p>

</div>

<div class="stat">

<h3>Final Total</h3>

<p id="grandTotal">
0
</p>

</div>

</div>

<button onclick="saveMilk()">
Save Milk Entry
</button>

<button onclick="shareTodayReport()">
Share Today Report
</button>

</div>

</div>

<!-- RECORDS -->

<div
id="recordsSection"
class="hidden"
>

<div class="card">

<h2>
Milk Records
</h2>

<table>

<thead>

<tr>

<th>Date</th>
<th>Client</th>
<th>AM</th>
<th>PM</th>
<th>Discard</th>
<th>Total</th>
<th>Cows</th>

</tr>

</thead>

<tbody id="records">
</tbody>

</table>

</div>

</div>

</div>

<script>

let milkChart;

const username =
    localStorage.getItem(
        "username"
    );

const permissions =
    JSON.parse(

        localStorage.getItem(
            "permissions"
        ) || "[]"
    );

document.getElementById(
    "managerInfo"
).innerText =
    "Logged in as " +
    username;

document.getElementById(
    "permissionInfo"
).innerText =
    permissions.join(", ");

function showSection(id,btn){

    document
    .querySelectorAll(".main > div[id]")
    .forEach(sec => {

        sec.classList.add(
            "hidden"
        );
    });

    document.getElementById(id)
    .classList.remove(
        "hidden"
    );

    document
    .querySelectorAll(".sideBtn")
    .forEach(b => {

        b.classList.remove(
            "activeBtn"
        );
    });

    if(btn){

        btn.classList.add(
            "activeBtn"
        );
    }
}

function logout(){

    localStorage.clear();

    window.location = "/";
}

function val(id){

    return Number(

        document.getElementById(id)
        .value

    ) || 0;
}

function calculateTotals(){

    const dairyAM =
        val("dairyAM");

    const dairyPM =
        val("dairyPM");

    const staffAM =
        val("staffAM");

    const staffPM =
        val("staffPM");

    const calfAM =
        val("calfAM");

    const calfPM =
        val("calfPM");

    const discard =
        val("discardedMilk");

    const totalAM =
        dairyAM +
        staffAM +
        calfAM;

    const totalPM =
        dairyPM +
        staffPM +
        calfPM;

    const finalTotal =
        totalAM +
        totalPM -
        discard;

    document.getElementById(
        "totalAM"
    ).innerText =
        totalAM.toFixed(1);

    document.getElementById(
        "totalPM"
    ).innerText =
        totalPM.toFixed(1);

    document.getElementById(
        "discardTotal"
    ).innerText =
        discard.toFixed(1);

    document.getElementById(
        "grandTotal"
    ).innerText =
        finalTotal.toFixed(1);

    return {

        totalAM,
        totalPM,
        finalTotal,
        discard
    };
}

async function saveMilk(){

    const calc =
        calculateTotals();

    const data = {

        type:"milk",

        client:
            document.getElementById(
                "clientSelect"
            ).value,

        worker:username,

        date:
            document.getElementById(
                "date"
            ).value,

        milkAM:
            calc.totalAM,

        milkPM:
            calc.totalPM,

        discardedMilk:
            calc.discard,

        dailyMilk:
            calc.finalTotal,

        cows:
            val("cowCount")
    };

    await fetch("/add",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify(data)
    });

    alert(
        "Milk Entry Saved ✅"
    );

    loadDashboard();
}

async function shareTodayReport(){

    const text = `

🐄 Dairy Report

Manager:
${username}

Client:
${document.getElementById("clientSelect").value}

Date:
${document.getElementById("date").value}

AM:
${document.getElementById("totalAM").innerText}

PM:
${document.getElementById("totalPM").innerText}

Total:
${document.getElementById("grandTotal").innerText}

`;

    if(navigator.share){

        navigator.share({

            title:"Dairy Report",

            text:text
        });
    }
}

async function loadClients(){

    const res =
        await fetch("/clients");

    const clients =
        await res.json();

    const select =
        document.getElementById(
            "clientSelect"
        );

    select.innerHTML = `

    <option value="">
    Select Client
    </option>
    `;

    clients.forEach(c => {

        select.innerHTML += `

        <option value="${c.name}">
        ${c.name}
        </option>
        `;
    });
}

async function loadDashboard(){

    const month =
        new Date()
        .toISOString()
        .slice(0,7);

    const client =
        document.getElementById(
            "clientSelect"
        ).value;

    const res =
        await fetch(

            "/dashboard?month=" +
            month +
            "&client=" +
            client
        );

    const d =
        await res.json();

    document.getElementById(
        "dashboardMilk"
    ).innerText =
        Number(
            d.totalMilk || 0
        ).toFixed(1) + "L";

    document.getElementById(
        "dashboardAM"
    ).innerText =
        Number(
            d.totalAMMilk || 0
        ).toFixed(1) + "L";

    document.getElementById(
        "dashboardPM"
    ).innerText =
        Number(
            d.totalPMMilk || 0
        ).toFixed(1) + "L";

    document.getElementById(
        "dashboardDiscard"
    ).innerText =
        Number(
            d.totalDiscardedMilk || 0
        ).toFixed(1) + "L";

    const table =
        document.getElementById(
            "records"
        );

    table.innerHTML = "";

    const labels = [];
    const milkData = [];

    (d.records || []).forEach(r => {

        labels.push(r.date);

        milkData.push(
            r.dailyMilk
        );

        table.innerHTML += `

        <tr>

        <td>${r.date}</td>

        <td>${r.client}</td>

        <td>${Number(
            r.milkAM || 0
        ).toFixed(1)}</td>

        <td>${Number(
            r.milkPM || 0
        ).toFixed(1)}</td>

        <td>${Number(
            r.discardedMilk || 0
        ).toFixed(1)}</td>

        <td>${Number(
            r.dailyMilk || 0
        ).toFixed(1)}</td>

        <td>${Number(
            r.cows || 0
        )}</td>

        </tr>
        `;
    });

    if(milkChart){
        milkChart.destroy();
    }

    milkChart =
        new Chart(

        document.getElementById(
            "milkChart"
        ),

        {

            type:"line",

            data:{

                labels:labels,

                datasets:[{

                    label:
                    "Milk Production",

                    data:milkData,

                    borderColor:"#60a5fa",

                    tension:0.4
                }]
            }
        });
}

document.getElementById(
    "clientSelect"
).addEventListener(

    "change",

    loadDashboard
);

loadClients();

loadDashboard();

</script>

</body>
</html>
