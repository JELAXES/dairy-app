<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Kshiralaya Manager
</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial,sans-serif;

    background:#0f172a;

    color:white;

    display:flex;

    min-height:100vh;
}

.sidebar{

    width:250px;

    background:#111827;

    padding:20px;

    display:flex;

    flex-direction:column;
}

.logoBox{

    text-align:center;

    margin-bottom:30px;
}

.logoBox img{

    width:140px;

    border-radius:20px;

    margin-bottom:10px;
}

.logoText{

    font-size:28px;

    font-weight:bold;

    background:linear-gradient(
        90deg,
        #60a5fa,
        #a855f7
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.sideBtn{

    width:100%;

    padding:15px;

    margin-bottom:15px;

    border:none;

    border-radius:12px;

    background:#1e293b;

    color:white;

    cursor:pointer;

    text-align:left;

    font-size:15px;
}

.sideBtn:hover{

    background:#2563eb;
}

.activeBtn{

    background:linear-gradient(
        90deg,
        #3b82f6,
        #8b5cf6
    );
}

.main{

    flex:1;

    padding:25px;

    overflow-y:auto;
}

.card{

    background:#111827;

    border-radius:18px;

    padding:20px;

    margin-bottom:25px;
}

.grid{

    display:grid;

    grid-template-columns:
    1fr 1fr;

    gap:20px;
}

input,
select{

    width:100%;

    padding:14px;

    margin-top:12px;

    border:none;

    border-radius:12px;

    background:#1e293b;

    color:white;
}

button{

    width:100%;

    padding:14px;

    margin-top:18px;

    border:none;

    border-radius:12px;

    background:linear-gradient(
        90deg,
        #3b82f6,
        #8b5cf6
    );

    color:white;

    cursor:pointer;
}

table{

    width:100%;

    border-collapse:collapse;

    margin-top:20px;
}

th,td{

    padding:14px;

    text-align:center;

    border-bottom:1px solid #374151;
}

th{

    color:#60a5fa;
}

.hidden{

    display:none;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logoBox">

<img src="logo.png">

<div class="logoText">
Kshiralaya
</div>

</div>

<button
class="sideBtn activeBtn"
onclick="showSection('milkSection',this)"
>
Milk Entry
</button>

<button
class="sideBtn"
onclick="showSection('feedSection',this)"
>
Feed Entry
</button>

<button
class="sideBtn"
onclick="showSection('recordsSection',this)"
>
Records
</button>

<button
class="sideBtn"
onclick="logout()"
>
Logout
</button>

</div>

<div class="main">

<!-- MILK -->

<div id="milkSection">

<div class="card">

<h2>
Milk Entry
</h2>

<div class="grid">

<div>

<select id="milkClient">

<option value="">
Select Client
</option>

</select>

</div>

<div>

<input
type="date"
id="milkDate"
/>

</div>

<div>

<input
type="number"
id="milkAM"
placeholder="AM Milk"
/>

</div>

<div>

<input
type="number"
id="milkPM"
placeholder="PM Milk"
/>

</div>

<div>

<input
type="number"
id="discardMilk"
placeholder="Discard Milk"
/>

</div>

<div>

<input
type="number"
id="cowCount"
placeholder="Cow Count"
/>

</div>

</div>

<button onclick="saveMilk()">
Save Milk Entry
</button>

</div>

</div>

<!-- FEED -->

<div
id="feedSection"
class="hidden"
>

<div class="card">

<h2>
Feed Entry
</h2>

<div class="grid">

<div>

<select id="feedClient">

<option value="">
Select Client
</option>

</select>

</div>

<div>

<input
type="text"
id="feedName"
placeholder="Feed Name"
/>

</div>

<div>

<input
type="number"
id="feedQty"
placeholder="Quantity KG"
/>

</div>

<div>

<input
type="number"
id="feedCost"
placeholder="Cost"
/>

</div>

<div>

<input
type="month"
id="feedMonth"
/>

</div>

</div>

<button onclick="saveFeed()">
Save Feed Entry
</button>

</div>

</div>

<!-- RECORDS -->

<div
id="recordsSection"
class="hidden"
>

<div class="card">

<h2>
Milk Records
</h2>

<table>

<thead>

<tr>

<th>Date</th>
<th>Client</th>
<th>AM</th>
<th>PM</th>
<th>Discard</th>
<th>Total</th>
<th>Cows</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="milkRecords">

</tbody>

</table>

</div>

<br>

<div class="card">

<h2>
Feed Records
</h2>

<table>

<thead>

<tr>

<th>Client</th>
<th>Feed</th>
<th>Quantity</th>
<th>Cost</th>
<th>Month</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="feedRecords">

</tbody>

</table>

</div>

</div>

</div>

<script>

// ======================
// SWITCH
// ======================

function showSection(id,btn){

    document
    .querySelectorAll(".main > div")
    .forEach(sec => {

        sec.classList.add(
            "hidden"
        );
    });

    document
    .getElementById(id)
    .classList.remove(
        "hidden"
    );

    document
    .querySelectorAll(".sideBtn")
    .forEach(b => {

        b.classList.remove(
            "activeBtn"
        );
    });

    btn.classList.add(
        "activeBtn"
    );

    if(id === "recordsSection"){

        loadMilkRecords();

        loadFeedRecords();
    }
}

// ======================
// LOGOUT
// ======================

function logout(){

    localStorage.clear();

    window.location = "/";
}

// ======================
// CLIENTS
// ======================

async function loadClients(){

    const res =
    await fetch("/clients");

    const clients =
    await res.json();

    const milkSelect =
    document.getElementById(
        "milkClient"
    );

    const feedSelect =
    document.getElementById(
        "feedClient"
    );

    milkSelect.innerHTML = `
    <option value="">
    Select Client
    </option>
    `;

    feedSelect.innerHTML = `
    <option value="">
    Select Client
    </option>
    `;

    clients.forEach(c => {

        milkSelect.innerHTML += `

        <option value="${c.name}">
        ${c.name}
        </option>
        `;

        feedSelect.innerHTML += `

        <option value="${c.name}">
        ${c.name}
        </option>
        `;
    });
}

// ======================
// SAVE MILK
// ======================

async function saveMilk(){

    const client =
    document.getElementById(
        "milkClient"
    ).value;

    if(!client){

        alert(
            "Select Client"
        );

        return;
    }

    const milkAM =
    Number(

        document.getElementById(
            "milkAM"
        ).value

    ) || 0;

    const milkPM =
    Number(

        document.getElementById(
            "milkPM"
        ).value

    ) || 0;

    const data = {

        type:"milk",

        client,

        worker:
        localStorage.getItem(
            "username"
        ) || "Manager",

        date:
        document.getElementById(
            "milkDate"
        ).value,

        milkAM,

        milkPM,

        discardedMilk:Number(

            document.getElementById(
                "discardMilk"
            ).value

        ) || 0,

        cows:Number(

            document.getElementById(
                "cowCount"
            ).value

        ) || 0,

        dailyMilk:
        milkAM + milkPM
    };

    await fetch("/add",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify(data)
    });

    alert(
        "Milk Entry Saved ✅"
    );

    loadMilkRecords();
}

// ======================
// SAVE FEED
// ======================

async function saveFeed(){

    const client =
    document.getElementById(
        "feedClient"
    ).value;

    if(!client){

        alert(
            "Select Client"
        );

        return;
    }

    const data = {

        client,

        feedName:
        document.getElementById(
            "feedName"
        ).value,

        quantity:Number(

            document.getElementById(
                "feedQty"
            ).value

        ) || 0,

        cost:Number(

            document.getElementById(
                "feedCost"
            ).value

        ) || 0,

        month:
        document.getElementById(
            "feedMonth"
        ).value
    };

    await fetch("/save-feed",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify(data)
    });

    alert(
        "Feed Saved ✅"
    );

    loadFeedRecords();
}

// ======================
// LOAD MILK RECORDS
// ======================

async function loadMilkRecords(){

    const res =
    await fetch("/dashboard");

    const data =
    await res.json();

    const tbody =
    document.getElementById(
        "milkRecords"
    );

    tbody.innerHTML = "";

    data.records.forEach(r => {

        tbody.innerHTML += `

        <tr>

        <td>${r.date || ""}</td>

        <td>${r.client || ""}</td>

        <td>${r.milkAM || 0}</td>

        <td>${r.milkPM || 0}</td>

        <td>${r.discardedMilk || 0}</td>

        <td>${r.dailyMilk || 0}</td>

        <td>${r.cows || 0}</td>

        <td>

        <button
        onclick="editMilk('${r._id}')"
        >
        Edit
        </button>

        <button
        onclick="deleteMilk('${r._id}')"
        style="
        background:#dc2626;
        margin-top:8px;
        "
        >
        Delete
        </button>

        </td>

        </tr>
        `;
    });
}

// ======================
// LOAD FEED RECORDS
// ======================

async function loadFeedRecords(){

    const res =
    await fetch("/feeds");

    const feeds =
    await res.json();

    const tbody =
    document.getElementById(
        "feedRecords"
    );

    tbody.innerHTML = "";

    feeds.forEach(feed => {

        tbody.innerHTML += `

        <tr>

        <td>${feed.client}</td>

        <td>${feed.feedName}</td>

        <td>${feed.quantity} KG</td>

        <td>₹${feed.cost}</td>

        <td>${feed.month}</td>

        <td>

        <button
        onclick="editFeed('${feed._id}')"
        >
        Edit
        </button>

        <button
        onclick="deleteFeed('${feed._id}')"
        style="
        background:#dc2626;
        margin-top:8px;
        "
        >
        Delete
        </button>

        </td>

        </tr>
        `;
    });
}

// ======================
// EDIT MILK
// ======================

async function editMilk(id){

    const am =
    prompt("AM Milk");

    const pm =
    prompt("PM Milk");

    const discard =
    prompt("Discard");

    if(!am || !pm) return;

    await fetch("/edit-milk",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({

            id,

            milkAM:Number(am),

            milkPM:Number(pm),

            discardedMilk:Number(discard),

            dailyMilk:
            Number(am) +
            Number(pm)
        })
    });

    loadMilkRecords();
}

// ======================
// DELETE MILK
// ======================

async function deleteMilk(id){

    const sure =
    confirm(
        "Delete Milk Entry?"
    );

    if(!sure) return;

    await fetch("/delete-milk",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({
            id
        })
    });

    loadMilkRecords();
}

// ======================
// EDIT FEED
// ======================

async function editFeed(id){

    const name =
    prompt("Feed Name");

    const qty =
    prompt("Quantity KG");

    const cost =
    prompt("Cost");

    if(!name || !qty || !cost) return;

    await fetch("/edit-feed",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({

            id,

            feedName:name,

            quantity:Number(qty),

            cost:Number(cost)
        })
    });

    loadFeedRecords();
}

// ======================
// DELETE FEED
// ======================

async function deleteFeed(id){

    const sure =
    confirm(
        "Delete Feed Entry?"
    );

    if(!sure) return;

    await fetch("/delete-feed",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({
            id
        })
    });

    loadFeedRecords();
}

// ======================
// INIT
// ======================

loadClients();
loadMilkRecords();
loadFeedRecords();

</script>

</body>

</html>
