<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Milk Entry Panel</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family:Arial;
    background:#f1f5f9;
    padding:20px;
    margin:0;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    max-width:900px;
    margin-left:auto;
    margin-right:auto;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.stats{
    display:grid;
    grid-template-columns:1fr 1fr 1fr 1fr;
    gap:15px;
}

.stat{
    background:#dbeafe;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

th{
    background:#2563eb;
    color:white;
}

canvas{
    background:white;
    border-radius:15px;
    padding:10px;
}

@media(max-width:900px){

    .grid{
        grid-template-columns:1fr;
    }

    .stats{
        grid-template-columns:1fr 1fr;
    }
}

</style>

</head>

<body>

<script>

if(
    localStorage.getItem("role")
    !== "worker"
){
    window.location = "/";
}

</script>

<div class="card">

<h1>🐄 Daily Milk Entry</h1>

<div class="grid">

<div>
<label>Date</label>
<input type="date" id="date">
</div>

<div>
<label>No Of Cows</label>
<input type="number" id="cowCount">
</div>

<div>
<label>Milk AM</label>
<input
type="number"
id="milkAM"
oninput="updateMilkTotal()"
>
</div>

<div>
<label>Milk PM</label>
<input
type="number"
id="milkPM"
oninput="updateMilkTotal()"
>
</div>

<div>
<label>Discarded Milk</label>
<input
type="number"
id="discardedMilk"
value="0"
oninput="updateMilkTotal()"
>
</div>

</div>

<button onclick="saveMilk()">
Save Milk Entry
</button>

</div>

<!-- MILK ANALYTICS -->

<div class="card">

<h2>Milk Dashboard</h2>

<div class="stats">

<div class="stat">
<h3>Total AM Milk</h3>
<p id="totalAM">0 L</p>
</div>

<div class="stat">
<h3>Total PM Milk</h3>
<p id="totalPM">0 L</p>
</div>

<div class="stat">
<h3>Total Milk</h3>
<p id="totalMilkDashboard">0 L</p>
</div>

<div class="stat">
<h3>Discarded Milk</h3>
<p id="totalDiscarded">0 L</p>
</div>

</div>

<br><br>

<canvas id="milkChart"></canvas>

</div>

<!-- RECORDS -->

<div class="card">

<h2>Milk Records</h2>

<table>

<thead>

<tr>
<th>Date</th>
<th>AM</th>
<th>PM</th>
<th>Discarded</th>
<th>Total</th>
<th>Cows</th>
</tr>

</thead>

<tbody id="records">
</tbody>

</table>

</div>

<script>

let milkChart;

// GET VALUE

function val(id){

    return Number(
        document.getElementById(id).value
    ) || 0;
}

// AUTO TOTAL

function updateMilkTotal(){

    const am =
        val("milkAM");

    const pm =
        val("milkPM");

    const discarded =
        val("discardedMilk");

    return (
        am +
        pm +
        discarded
    );
}

// SAVE ENTRY

async function saveMilk(){

    const total =
        updateMilkTotal();

    const data = {

        type:"milk",

        date:
            document.getElementById(
                "date"
            ).value,

        milkAM:
            val("milkAM"),

        milkPM:
            val("milkPM"),

        discardedMilk:
            val("discardedMilk"),

        dailyMilk:total,

        cows:
            val("cowCount")
    };

    await fetch("/add",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(data)
    });

    alert(
        "Milk Entry Saved ✅"
    );

    loadDashboard();
}

// LOAD DASHBOARD

async function loadDashboard(){

    const currentMonth =
        new Date()
        .toISOString()
        .slice(0,7);

    const res =
        await fetch(
            "/dashboard?month=" +
            currentMonth
        );

    const d =
        await res.json();

    let totalAM = 0;
    let totalPM = 0;
    let totalDiscarded = 0;

    const labels = [];
    const milkData = [];

    const table =
        document.getElementById(
            "records"
        );

    table.innerHTML = "";

    (d.records || []).forEach(r => {

        totalAM +=
            Number(r.milkAM || 0);

        totalPM +=
            Number(r.milkPM || 0);

        totalDiscarded +=
            Number(r.discardedMilk || 0);

        labels.push(r.date);

        milkData.push(
            Number(r.dailyMilk || 0)
        );

        table.innerHTML += `

        <tr>

        <td>${r.date || "-"}</td>

        <td>${Number(
            r.milkAM || 0
        ).toFixed(2)}</td>

        <td>${Number(
            r.milkPM || 0
        ).toFixed(2)}</td>

        <td>${Number(
            r.discardedMilk || 0
        ).toFixed(2)}</td>

        <td>${Number(
            r.dailyMilk || 0
        ).toFixed(2)}</td>

        <td>${Number(
            r.cows || 0
        )}</td>

        </tr>
        `;
    });

    document.getElementById(
        "totalAM"
    ).innerText =
        totalAM.toFixed(2) + " L";

    document.getElementById(
        "totalPM"
    ).innerText =
        totalPM.toFixed(2) + " L";

    document.getElementById(
        "totalMilkDashboard"
    ).innerText =
        d.totalMilk.toFixed(2) + " L";

    document.getElementById(
        "totalDiscarded"
    ).innerText =
        totalDiscarded.toFixed(2) + " L";

    if(milkChart){
        milkChart.destroy();
    }

    milkChart =
        new Chart(

        document.getElementById(
            "milkChart"
        ),

        {

            type:"line",

            data:{

                labels:labels,

                datasets:[{

                    label:"Milk Production",

                    data:milkData
                }]
            }
        });
}

loadDashboard();

</script>

</body>
</html>
