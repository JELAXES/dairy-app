<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dairy ERP Login</title>

<style>

body{
    font-family:Arial;
    background:#f1f5f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:30px;
    border-radius:15px;
    width:350px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h1>🐄 Dairy ERP Login</h1>

<input id="username" placeholder="Username">

<input
type="password"
id="password"
placeholder="Password"
>

<button onclick="login()">
Login
</button>

</div>

<script>

function login(){

    const user =
        document.getElementById(
            "username"
        ).value;

    const pass =
        document.getElementById(
            "password"
        ).value;

    // ADMIN

    if(
        user === "Praveen" &&
        pass === "vishnu123"
    ){

        localStorage.setItem(
            "role",
            "admin"
        );

        window.location =
            "admin.html";

        return;
    }

    // WORKER

    if(
        user === "Sachin" &&
        pass === "sachin@123"
    ){

        localStorage.setItem(
            "role",
            "worker"
        );

        window.location =
            "worker.html";

        return;
    }

    alert("Wrong Login");
}

</script>

</body>
</html>
