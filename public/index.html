<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dairy ERP</title>

<style>

body{
    font-family:Arial;
    background:#f1f5f9;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.stats{
    display:grid;
    grid-template-columns:1fr 1fr 1fr 1fr;
    gap:15px;
}

.stat{
    background:#dbeafe;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

th{
    background:#2563eb;
    color:white;
}

@media(max-width:900px){

    .grid{
        grid-template-columns:1fr;
    }

    .stats{
        grid-template-columns:1fr 1fr;
    }
}

</style>

</head>

<body>

<h1>🐄 Dairy Farm ERP</h1>

<div class="card">

<div class="grid">

<div>
<label>Worker</label>
<input id="worker">
</div>

<div>
<label>Date</label>
<input type="date" id="date">
</div>

<div>
<label>Number of Cows</label>
<input type="number" id="cows">
</div>

<div>
<label>Total Milk (L)</label>
<input type="number" id="milk">
</div>

<div>
<label>Milk Price/Liter</label>
<input type="number" id="milkPrice">
</div>

<div>
<label>Salary</label>
<input type="number" id="salary">
</div>

</div>

</div>

<div class="card">

<h2>Feed Inputs</h2>

<div class="grid">

<div><input id="silageCost" placeholder="Silage ₹/KG"></div>
<div><input id="silageQty" placeholder="Silage KG/Cow"></div>

<div><input id="feedCost" placeholder="Feed ₹/KG"></div>
<div><input id="feedQty" placeholder="Feed KG/Cow"></div>

<div><input id="bhusaCost" placeholder="Bhusa ₹/KG"></div>
<div><input id="bhusaQty" placeholder="Bhusa KG/Cow"></div>

<div><input id="mineralCost" placeholder="Mineral ₹/KG"></div>
<div><input id="mineralQty" placeholder="Mineral KG/Cow"></div>

<div><input id="yeastCost" placeholder="Yeast ₹/KG"></div>
<div><input id="yeastQty" placeholder="Yeast KG/Cow"></div>

<div><input id="bufferCost" placeholder="Buffer ₹/KG"></div>
<div><input id="bufferQty" placeholder="Buffer KG/Cow"></div>

<div><input id="glycolCost" placeholder="Propylene Glycol ₹/KG"></div>
<div><input id="glycolQty" placeholder="Propylene Glycol KG/Cow"></div>

<div><input id="sodaCost" placeholder="Soda ₹/KG"></div>
<div><input id="sodaQty" placeholder="Soda KG/Cow"></div>

<div><input id="dcpCost" placeholder="DCP ₹/KG"></div>
<div><input id="dcpQty" placeholder="DCP KG/Cow"></div>

</div>

<br>

<button onclick="submitData()">
Save Daily Entry
</button>

</div>

<div class="card">

<h2>Farm Analytics</h2>

<div class="stats">

<div class="stat">
<h3>Total Expense</h3>
<p id="expense">₹0</p>
</div>

<div class="stat">
<h3>Total Revenue</h3>
<p id="revenue">₹0</p>
</div>

<div class="stat">
<h3>Total Milk</h3>
<p id="milkTotal">0</p>
</div>

<div class="stat">
<h3>Total Profit</h3>
<p id="profit">₹0</p>
</div>

</div>

</div>

<div class="card">

<h2>Daily Records</h2>

<table>

<thead>

<tr>
<th>Date</th>
<th>Worker</th>
<th>Cows</th>
<th>Milk</th>
<th>Expense</th>
<th>Revenue</th>
<th>Profit</th>
<th>Cost/Cow</th>
<th>Cost/Liter</th>
</tr>

</thead>

<tbody id="records">
</tbody>

</table>

</div>

<script>

function val(id){

    return Number(
        document.getElementById(id).value
    ) || 0;
}

async function submitData(){

    const cows = val("cows");

    const milk = val("milk");

    const milkPrice = val("milkPrice");

    const salary = val("salary");

    // Feed costs

    const feedTotal =

        (val("silageCost") * val("silageQty") * cows) +

        (val("feedCost") * val("feedQty") * cows) +

        (val("bhusaCost") * val("bhusaQty") * cows) +

        (val("mineralCost") * val("mineralQty") * cows) +

        (val("yeastCost") * val("yeastQty") * cows) +

        (val("bufferCost") * val("bufferQty") * cows) +

        (val("glycolCost") * val("glycolQty") * cows) +

        (val("sodaCost") * val("sodaQty") * cows) +

        (val("dcpCost") * val("dcpQty") * cows);

    const totalExpense =
        feedTotal + salary;

    const revenue =
        milk * milkPrice;

    const profit =
        revenue - totalExpense;

    const costPerCow =
        totalExpense / cows;

    const costPerLiter =
        totalExpense / milk;

    const data = {

        worker:
            document.getElementById("worker").value,

        date:
            document.getElementById("date").value,

        cows,
        milk,
        milkPrice,
        salary,

        silageCost:val("silageCost"),
        silageQty:val("silageQty"),

        feedCost:val("feedCost"),
        feedQty:val("feedQty"),

        bhusaCost:val("bhusaCost"),
        bhusaQty:val("bhusaQty"),

        mineralCost:val("mineralCost"),
        mineralQty:val("mineralQty"),

        yeastCost:val("yeastCost"),
        yeastQty:val("yeastQty"),

        bufferCost:val("bufferCost"),
        bufferQty:val("bufferQty"),

        glycolCost:val("glycolCost"),
        glycolQty:val("glycolQty"),

        sodaCost:val("sodaCost"),
        sodaQty:val("sodaQty"),

        dcpCost:val("dcpCost"),
        dcpQty:val("dcpQty"),

        totalExpense,
        revenue,
        profit,

        costPerCow,
        costPerLiter
    };

    await fetch("/add",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(data)
    });

    alert("Saved ✅");

    loadDashboard();
}

async function loadDashboard(){

    const res =
        await fetch("/dashboard");

    const d =
        await res.json();

    document.getElementById("expense")
        .innerText = "₹" + d.totalExpense;

    document.getElementById("revenue")
        .innerText = "₹" + d.totalRevenue;

    document.getElementById("milkTotal")
        .innerText = d.totalMilk + " L";

    document.getElementById("profit")
        .innerText = "₹" + d.totalProfit;

    const table =
        document.getElementById("records");

    table.innerHTML = "";

    d.records.forEach(r => {

        table.innerHTML += `

        <tr>

        <td>${r.date}</td>

        <td>${r.worker}</td>

        <td>${r.cows}</td>

        <td>${r.milk}</td>

        <td>₹${r.totalExpense.toFixed(2)}</td>

        <td>₹${r.revenue.toFixed(2)}</td>

        <td>₹${r.profit.toFixed(2)}</td>

        <td>₹${r.costPerCow.toFixed(2)}</td>

        <td>₹${r.costPerLiter.toFixed(2)}</td>

        </tr>
        `;
    });
}

loadDashboard();

</script>

</body>
</html>
