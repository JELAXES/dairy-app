<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dairy Farm Dashboard</title>

<style>

body{
    font-family:Arial;
    background:#f3f4f6;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.stat{
    background:#eff6ff;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th, td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

th{
    background:#2563eb;
    color:white;
}

.history{
    margin-top:30px;
}

@media(max-width:900px){
    .container{
        grid-template-columns:1fr;
    }
}

</style>
</head>
<body>

<h1>🐄 Dairy Farm Dashboard</h1>

<div class="container">

<div class="card">

<h2>Daily Entry</h2>

<label>Worker Name</label>
<input type="text" id="worker">

<label>Date</label>
<input type="date" id="date">

<label>Silage Cost</label>
<input type="number" id="silageCost">

<label>Feed Cost</label>
<input type="number" id="feedCost">

<label>Bhusa Cost</label>
<input type="number" id="bhusaCost">

<label>Salary</label>
<input type="number" id="salary">

<label>Milk Produced (L)</label>
<input type="number" id="milk">

<label>Price Per Liter</label>
<input type="number" id="price">

<button onclick="submitData()">Save Entry</button>

</div>

<div class="card">

<h2>Dashboard</h2>

<div class="stats">

<div class="stat">
<h3>Total Expense</h3>
<p id="expense">₹0</p>
</div>

<div class="stat">
<h3>Total Revenue</h3>
<p id="revenue">₹0</p>
</div>

<div class="stat">
<h3>Total Milk</h3>
<p id="milkTotal">0</p>
</div>

<div class="stat">
<h3>Profit</h3>
<p id="profit">₹0</p>
</div>

</div>

<br>

<button onclick="loadDashboard()">Refresh Dashboard</button>

</div>

</div>

<div class="card history">

<h2>Daily Records</h2>

<table>

<thead>
<tr>
<th>Date</th>
<th>Worker</th>
<th>Expense</th>
<th>Milk</th>
<th>Revenue</th>
<th>Profit</th>
</tr>
</thead>

<tbody id="historyTable">
</tbody>

</table>

</div>

<script>

async function submitData(){

    const silageCost = Number(document.getElementById("silageCost").value) || 0;
    const feedCost = Number(document.getElementById("feedCost").value) || 0;
    const bhusaCost = Number(document.getElementById("bhusaCost").value) || 0;
    const salary = Number(document.getElementById("salary").value) || 0;
    const milk = Number(document.getElementById("milk").value) || 0;
    const pricePerLiter = Number(document.getElementById("price").value) || 0;

    const data = {

        worker:document.getElementById("worker").value,

        date:document.getElementById("date").value,

        silageCost,
        feedCost,
        bhusaCost,
        salary,
        milk,
        pricePerLiter,

        totalExpense:
            silageCost +
            feedCost +
            bhusaCost +
            salary,

        revenue:
            milk *
            pricePerLiter
    };

    await fetch("/add",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify(data)
    });

    alert("Saved ✅");

    loadDashboard();
}

async function loadDashboard(){

    const res = await fetch("/dashboard");

    const d = await res.json();

    document.getElementById("expense").innerText =
        "₹" + d.totalExpense;

    document.getElementById("revenue").innerText =
        "₹" + d.totalRevenue;

    document.getElementById("milkTotal").innerText =
        d.totalMilk + " L";

    document.getElementById("profit").innerText =
        "₹" + d.profit;

    const table = document.getElementById("historyTable");

    table.innerHTML = "";

    d.records.forEach(r => {

        const profit =
            r.revenue -
            r.totalExpense;

        table.innerHTML += `
        <tr>
            <td>${r.date}</td>
            <td>${r.worker}</td>
            <td>₹${r.totalExpense}</td>
            <td>${r.milk} L</td>
            <td>₹${r.revenue}</td>
            <td>₹${profit}</td>
        </tr>
        `;
    });
}

loadDashboard();

</script>

</body>
</html>
