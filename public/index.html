<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Kshiralaya Login
</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial,sans-serif;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #111827
    );

    overflow:hidden;
}

.loginBox{

    width:420px;

    background:
    rgba(17,24,39,0.95);

    backdrop-filter:blur(20px);

    border-radius:30px;

    padding:40px;

    box-shadow:
    0 0 40px rgba(0,0,0,0.5);

    text-align:center;

    animation:fadeIn 0.6s ease;
}

.logo{

    width:180px;

    margin:auto;

    margin-bottom:15px;

    border-radius:25px;

    box-shadow:
    0 0 30px rgba(255,255,255,0.08);
}

.brand{

    font-size:42px;

    font-weight:bold;

    margin-bottom:8px;

    background:linear-gradient(
        90deg,
        #60a5fa,
        #a855f7
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.tagline{

    color:#94a3b8;

    margin-bottom:35px;

    font-size:15px;

    letter-spacing:1px;
}

input{

    width:100%;

    padding:16px;

    margin-top:16px;

    border:none;

    border-radius:15px;

    background:#1e293b;

    color:white;

    font-size:15px;

    outline:none;
}

input::placeholder{

    color:#94a3b8;
}

button{

    width:100%;

    padding:16px;

    margin-top:22px;

    border:none;

    border-radius:15px;

    background:
    linear-gradient(
        90deg,
        #3b82f6,
        #8b5cf6
    );

    color:white;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    transition:0.2s;
}

button:hover{

    transform:scale(1.02);
}

.createBtn{

    background:#1e293b;

    margin-top:12px;
}

.note{

    margin-top:18px;

    color:#94a3b8;

    font-size:13px;
}

@keyframes fadeIn{

    from{

        opacity:0;

        transform:translateY(20px);
    }

    to{

        opacity:1;

        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="loginBox">

<!-- YOUR LOGO -->

<img
src="logo.png"
class="logo"
>

<div class="brand">
Kshiralaya
</div>

<div class="tagline">
PURE CARE PURE MILK
</div>

<input
type="text"
id="username"
placeholder="Username"
/>

<input
type="password"
id="password"
placeholder="Password"
/>

<button onclick="login()">
Login
</button>

<button
class="createBtn"
onclick="window.location='signup.html'"
>
Create Account
</button>

<div class="note">
Manager accounts require admin approval
</div>

</div>

<script>

async function login(){

    try{

        const username =
        document.getElementById(
            "username"
        ).value;

        const password =
        document.getElementById(
            "password"
        ).value;

        const res =
        await fetch("/login",{

            method:"POST",

            headers:{
                "Content-Type":
                "application/json"
            },

            body:JSON.stringify({

                username,
                password
            })
        });

        const data =
        await res.json();

        console.log(data);

        if(!data.success){

            alert(
                data.message ||
                "Login Failed"
            );

            return;
        }

        localStorage.setItem(
            "username",
            data.user.username
        );

        localStorage.setItem(
            "role",
            data.user.role
        );

        if(
            data.user.role === "admin"
        ){

            window.location =
            "admin.html";

        }else{

            window.location =
            "worker.html";
        }

    }catch(err){

        console.log(err);

        alert(
            "Server Error"
        );
    }
}

</script>

</body>
</html>
