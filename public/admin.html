<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Kshiralaya Admin
</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    min-height:100vh;
}

.sidebar{
    width:260px;
    background:#111827;
    padding:20px;
    display:flex;
    flex-direction:column;
}

.logoBox{
    text-align:center;
    margin-bottom:30px;
}

.logoBox img{
    width:150px;
    border-radius:20px;
    margin-bottom:10px;
}

.logoText{
    font-size:28px;
    font-weight:bold;
    background:linear-gradient(
        90deg,
        #60a5fa,
        #a855f7
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.sideBtn{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
    cursor:pointer;
    text-align:left;
    font-size:15px;
}

.sideBtn:hover{
    background:#2563eb;
}

.activeBtn{
    background:linear-gradient(
        90deg,
        #3b82f6,
        #8b5cf6
    );
}

.main{
    flex:1;
    padding:25px;
    overflow-y:auto;
}

.card{
    background:#111827;
    border-radius:18px;
    padding:20px;
    margin-bottom:25px;
}

.stats{
    display:grid;
    grid-template-columns:
    repeat(4,1fr);
    gap:15px;
}

.stat{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

.stat h3{
    color:#94a3b8;
    margin-bottom:10px;
}

.stat p{
    font-size:24px;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:
    1fr 1fr;
    gap:20px;
}

input,
select{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
}

button{
    width:100%;
    padding:14px;
    margin-top:18px;
    border:none;
    border-radius:12px;
    background:linear-gradient(
        90deg,
        #3b82f6,
        #8b5cf6
    );
    color:white;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    padding:14px;
    text-align:center;
    border-bottom:1px solid #374151;
}

th{
    color:#60a5fa;
}

.hidden{
    display:none;
}

.userCard{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

canvas{
    background:#1e293b;
    border-radius:15px;
    padding:15px;
    max-height:250px !important;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logoBox">

<img src="logo.png">

<div class="logoText">
Kshiralaya
</div>

</div>

<button
class="sideBtn activeBtn"
onclick="showSection('dashboardSection',this)"
>
Dashboard
</button>

<button
class="sideBtn"
onclick="showSection('clientsSection',this)"
>
Clients
</button>

<button
class="sideBtn"
onclick="showSection('feedSection',this)"
>
Feed
</button>

<button
class="sideBtn"
onclick="showSection('managerSection',this)"
>
Managers
</button>

<button
class="sideBtn"
onclick="showSection('recordsSection',this)"
>
Records
</button>

<button
class="sideBtn"
onclick="logout()"
>
Logout
</button>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboardSection">

<div class="stats">

<div class="stat">
<h3>Revenue</h3>
<p id="revenue">₹0</p>
</div>

<div class="stat">
<h3>Expense</h3>
<p id="expense">₹0</p>
</div>

<div class="stat">
<h3>Profit</h3>
<p id="profit">₹0</p>
</div>

<div class="stat">
<h3>Total Milk</h3>
<p id="milk">0L</p>
</div>

</div>

<br>

<div class="card">

<h2>
Milk Analytics
</h2>

<br>

<canvas id="milkChart"></canvas>

</div>

</div>

<!-- CLIENTS -->

<div
id="clientsSection"
class="hidden"
>

<div class="card">

<h2>
Create Client
</h2>

<input
type="text"
id="clientName"
placeholder="Client Name"
/>

<input
type="number"
id="clientPrice"
placeholder="Price Per Liter"
/>

<button onclick="createClient()">
Create Client
</button>

</div>

<div class="card">

<h2>
Client List
</h2>

<div id="clientList"></div>

</div>

</div>

<!-- FEED -->

<div
id="feedSection"
class="hidden"
>

<div class="card">

<h2>
Feed Management
</h2>

<div class="grid">

<div>

<select id="feedClient">

<option value="">
Select Client
</option>

</select>

</div>

<div>

<input
type="text"
id="feedName"
placeholder="Feed Name"
/>

</div>

<div>

<input
type="number"
id="feedQty"
placeholder="Quantity KG"
/>

</div>

<div>

<input
type="number"
id="feedCost"
placeholder="Cost"
/>

</div>

<div>

<input
type="month"
id="feedMonth"
/>

</div>

</div>

<button onclick="saveFeed()">
Save Feed
</button>

</div>

<div class="card">

<h2>
Feed Records
</h2>

<table>

<thead>

<tr>

<th>Client</th>
<th>Feed</th>
<th>Quantity</th>
<th>Cost</th>
<th>Month</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="feedRecords">

</tbody>

</table>

</div>

</div>

<!-- MANAGERS -->

<div
id="managerSection"
class="hidden"
>

<div class="card">

<h2>
Pending Managers
</h2>

<div id="pendingUsers"></div>

</div>

</div>

<!-- RECORDS -->

<div
id="recordsSection"
class="hidden"
>

<div class="card">

<h2>
Milk Records
</h2>

<table>

<thead>

<tr>

<th>Date</th>
<th>Client</th>
<th>AM</th>
<th>PM</th>
<th>Discard</th>
<th>Total</th>
<th>Cows</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="records"></tbody>

</table>

</div>

</div>

</div>

<script>

let milkChart;

// ======================
// SWITCH SECTION
// ======================

function showSection(id,btn){

    document
    .querySelectorAll(".main > div")
    .forEach(sec => {

        sec.classList.add("hidden");
    });

    document
    .getElementById(id)
    .classList.remove("hidden");

    document
    .querySelectorAll(".sideBtn")
    .forEach(b => {

        b.classList.remove("activeBtn");
    });

    btn.classList.add("activeBtn");

    if(id === "dashboardSection"){
        loadDashboard();
    }

    if(id === "clientsSection"){
        loadClients();
    }

    if(id === "feedSection"){
        loadFeeds();
        loadFeedClients();
    }

    if(id === "managerSection"){
        loadPendingUsers();
    }

    if(id === "recordsSection"){
        loadRecords();
    }
}

// ======================
// LOGOUT
// ======================

function logout(){

    localStorage.clear();

    window.location = "/";
}

// ======================
// DASHBOARD
// ======================

async function loadDashboard(){

    const res =
    await fetch("/dashboard");

    const d =
    await res.json();

    document.getElementById(
        "revenue"
    ).innerText =
    "₹" +
    Number(d.totalRevenue || 0)
    .toFixed(2);

    document.getElementById(
        "expense"
    ).innerText =
    "₹" +
    Number(d.totalExpense || 0)
    .toFixed(2);

    document.getElementById(
        "profit"
    ).innerText =
    "₹" +
    Number(d.totalProfit || 0)
    .toFixed(2);

    document.getElementById(
        "milk"
    ).innerText =
    Number(d.totalMilk || 0)
    .toFixed(1) + "L";

    if(milkChart){
        milkChart.destroy();
    }

    milkChart =
    new Chart(

        document.getElementById(
            "milkChart"
        ),

        {

            type:"line",

            data:{

                labels:["Milk"],

                datasets:[{

                    label:
                    "Milk Production",

                    data:[
                        d.totalMilk || 0
                    ],

                    borderColor:"#60a5fa",

                    tension:0.4
                }]
            }
        });
}

// ======================
// CLIENTS
// ======================

async function createClient(){

    const data = {

        name:
        document.getElementById(
            "clientName"
        ).value,

        pricePerLiter:Number(

            document.getElementById(
                "clientPrice"
            ).value

        ) || 0
    };

    await fetch("/create-client",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify(data)
    });

    loadClients();
}

async function loadClients(){

    const res =
    await fetch("/clients");

    const clients =
    await res.json();

    const div =
    document.getElementById(
        "clientList"
    );

    div.innerHTML = "";

    clients.forEach(c => {

        div.innerHTML += `

        <div class="userCard">

            <h3>${c.name}</h3>

            <p>

            ₹${c.pricePerLiter}/L

            </p>

            <button
            onclick="editClient(
                '${c._id}',
                '${c.name}',
                '${c.pricePerLiter}'
            )"
            >
            Edit
            </button>

            <button
            onclick="deleteClient('${c._id}')"
            style="
            background:#dc2626;
            margin-top:10px;
            "
            >
            Delete
            </button>

        </div>
        `;
    });
}

async function deleteClient(id){

    const sure =
    confirm(
        "Delete Client?"
    );

    if(!sure) return;

    await fetch("/delete-client",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({
            id
        })
    });

    loadClients();
}

async function editClient(
    id,
    oldName,
    oldPrice
){

    const name =
    prompt(
        "Client Name",
        oldName
    );

    const price =
    prompt(
        "Price Per Liter",
        oldPrice
    );

    if(!name || !price) return;

    await fetch("/edit-client",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({

            id,

            name,

            pricePerLiter:Number(price)
        })
    });

    loadClients();
}

// ======================
// FEED CLIENTS
// ======================

async function loadFeedClients(){

    const res =
    await fetch("/clients");

    const clients =
    await res.json();

    const select =
    document.getElementById(
        "feedClient"
    );

    select.innerHTML = `

    <option value="">
    Select Client
    </option>
    `;

    clients.forEach(c => {

        select.innerHTML += `

        <option value="${c.name}">
        ${c.name}
        </option>
        `;
    });
}

// ======================
// SAVE FEED
// ======================

async function saveFeed(){

    const client =
    document.getElementById(
        "feedClient"
    ).value;

    if(!client){

        alert(
            "Select Client"
        );

        return;
    }

    const data = {

        client,

        feedName:
        document.getElementById(
            "feedName"
        ).value,

        quantity:Number(

            document.getElementById(
                "feedQty"
            ).value

        ) || 0,

        cost:Number(

            document.getElementById(
                "feedCost"
            ).value

        ) || 0,

        month:
        document.getElementById(
            "feedMonth"
        ).value
    };

    await fetch("/save-feed",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify(data)
    });

    loadFeeds();
}

// ======================
// LOAD FEEDS
// ======================

async function loadFeeds(){

    const res =
    await fetch("/feeds");

    const feeds =
    await res.json();

    const tbody =
    document.getElementById(
        "feedRecords"
    );

    tbody.innerHTML = "";

    feeds.forEach(feed => {

        const row =
        document.createElement("tr");

        row.innerHTML = `

        <td>${feed.client}</td>

        <td>${feed.feedName}</td>

        <td>${feed.quantity} KG</td>

        <td>₹${feed.cost}</td>

        <td>${feed.month}</td>

        <td>

        <button
        onclick="editFeed('${feed._id}')"
        >
        Edit
        </button>

        <button
        onclick="deleteFeed('${feed._id}')"
        style="
        background:#dc2626;
        margin-top:8px;
        "
        >
        Delete
        </button>

        </td>
        `;

        tbody.appendChild(row);
    });
}

async function deleteFeed(id){

    const sure =
    confirm(
        "Delete Feed Entry?"
    );

    if(!sure) return;

    await fetch("/delete-feed",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({
            id
        })
    });

    loadFeeds();
}

async function editFeed(id){

    const name =
    prompt("Feed Name");

    const qty =
    prompt("Quantity KG");

    const cost =
    prompt("Cost");

    if(!name || !qty || !cost) return;

    await fetch("/edit-feed",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({

            id,

            feedName:name,

            quantity:Number(qty),

            cost:Number(cost)
        })
    });

    loadFeeds();
}

// ======================
// MANAGERS
// ======================

async function loadPendingUsers(){

    const res =
    await fetch("/pending-users");

    const users =
    await res.json();

    const div =
    document.getElementById(
        "pendingUsers"
    );

    div.innerHTML = "";

    users.forEach(user => {

        div.innerHTML += `

        <div class="userCard">

        <h3>
        ${user.username}
        </h3>

        <button
        onclick="approveUser('${user._id}')"
        >
        Approve
        </button>

        </div>
        `;
    });
}

async function approveUser(id){

    await fetch("/approve-user",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({
            id
        })
    });

    loadPendingUsers();
}

// ======================
// RECORDS
// ======================

async function loadRecords(){

    const res =
    await fetch("/dashboard");

    const data =
    await res.json();

    const tbody =
    document.getElementById(
        "records"
    );

    tbody.innerHTML = "";

    data.records.forEach(r => {

        tbody.innerHTML += `

        <tr>

        <td>${r.date || ""}</td>

        <td>${r.client || ""}</td>

        <td>${r.milkAM || 0}</td>

        <td>${r.milkPM || 0}</td>

        <td>${r.discardedMilk || 0}</td>

        <td>${r.dailyMilk || 0}</td>

        <td>${r.cows || 0}</td>

        <td>

        <button
        onclick="editMilk('${r._id}')"
        >
        Edit
        </button>

        <button
        onclick="deleteMilk('${r._id}')"
        style="
        background:#dc2626;
        margin-top:8px;
        "
        >
        Delete
        </button>

        </td>

        </tr>
        `;
    });
}

async function deleteMilk(id){

    const sure =
    confirm(
        "Delete Milk Entry?"
    );

    if(!sure) return;

    await fetch("/delete-milk",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({
            id
        })
    });

    loadRecords();
}

async function editMilk(id){

    const am =
    prompt("AM Milk");

    const pm =
    prompt("PM Milk");

    const discard =
    prompt("Discard");

    if(!am || !pm) return;

    await fetch("/edit-milk",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({

            id,

            milkAM:Number(am),

            milkPM:Number(pm),

            discardedMilk:Number(discard),

            dailyMilk:
            Number(am) +
            Number(pm)
        })
    });

    loadRecords();
}

// ======================
// INIT
// ======================

loadDashboard();
loadClients();
loadFeedClients();
loadFeeds();
loadPendingUsers();
loadRecords();

</script>

</body>

</html>
