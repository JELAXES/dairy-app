<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Kshiralaya Admin
</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial,sans-serif;

    background:
    linear-gradient(
        135deg,
        #090e1f,
        #050816
    );

    color:white;

    display:flex;

    min-height:100vh;

    overflow:hidden;
}

/* SIDEBAR */

.sidebar{

    width:240px;

    background:
    rgba(17,24,39,0.92);

    backdrop-filter:blur(14px);

    padding:20px;

    display:flex;

    flex-direction:column;

    border-right:
    1px solid rgba(255,255,255,0.05);
}

.logoBox{

    text-align:center;

    margin-bottom:30px;
}

.logoBox img{

    width:100px;

    border-radius:22px;

    margin-bottom:12px;

    box-shadow:
    0 0 20px rgba(139,92,246,0.35);
}

.logoText{

    font-size:34px;

    font-weight:bold;

    background:
    linear-gradient(
        90deg,
        #60a5fa,
        #8b5cf6
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.sideBtn{

    width:100%;

    padding:14px;

    margin-bottom:14px;

    border:none;

    border-radius:14px;

    background:#18233a;

    color:white;

    cursor:pointer;

    text-align:left;

    font-size:15px;

    transition:0.25s;
}

.sideBtn:hover{

    transform:translateY(-2px);

    background:
    linear-gradient(
        90deg,
        #3b82f6,
        #8b5cf6
    );
}

.activeBtn{

    background:
    linear-gradient(
        90deg,
        #3b82f6,
        #8b5cf6
    );
}

/* MAIN */

.main{

    flex:1;

    padding:22px;

    overflow-y:auto;
}

/* STATS */

.stats{

    display:grid;

    grid-template-columns:
    repeat(4,1fr);

    gap:18px;

    margin-bottom:20px;
}

.stat{

    background:#18233a;

    border-radius:20px;

    padding:22px;

    position:relative;

    overflow:hidden;

    box-shadow:
    0 0 18px rgba(0,0,0,0.28);
}

.stat::before{

    content:"";

    position:absolute;

    width:120px;
    height:120px;

    background:
    rgba(139,92,246,0.12);

    border-radius:50%;

    top:-50px;
    right:-50px;
}

.stat h3{

    color:#94a3b8;

    margin-bottom:12px;

    font-size:14px;
}

.stat p{

    font-size:30px;

    font-weight:bold;
}

/* DASHBOARD */

.dashboardGrid{

    display:grid;

    grid-template-columns:
    1.2fr 1fr;

    gap:20px;

    align-items:start;
}

.smallCharts{

    display:grid;

    gap:18px;
}

.chartCard{

    background:#18233a;

    border-radius:20px;

    padding:18px;

    box-shadow:
    0 0 18px rgba(0,0,0,0.25);

    height:280px;
}

.smallCharts .chartCard{

    height:180px;
}

.chartCard h2{

    margin-bottom:12px;

    font-size:18px;
}

canvas{

    width:100% !important;

    max-height:170px !important;
}

/* FORM */

.grid{

    display:grid;

    grid-template-columns:
    1fr 1fr;

    gap:16px;
}

input,
select{

    width:100%;

    padding:14px;

    border:none;

    border-radius:14px;

    background:#1f2d48;

    color:white;

    font-size:14px;
}

button{

    width:100%;

    padding:12px;

    margin-top:14px;

    border:none;

    border-radius:14px;

    background:
    linear-gradient(
        90deg,
        #3b82f6,
        #8b5cf6
    );

    color:white;

    cursor:pointer;

    font-size:14px;
}

.deleteBtn{

    background:#dc2626;
}

/* TABLE */

table{

    width:100%;

    border-collapse:collapse;

    margin-top:18px;
}

th,td{

    padding:14px;

    text-align:center;

    border-bottom:
    1px solid rgba(255,255,255,0.06);
}

th{

    color:#60a5fa;

    font-size:14px;
}

.hidden{
    display:none;
}

.userCard{

    background:#1f2d48;

    padding:14px;

    border-radius:14px;

    margin-top:12px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logoBox">

<img src="logo.png"/>

<div class="logoText">
Kshiralaya
</div>

</div>

<button
class="sideBtn activeBtn"
onclick="showSection('dashboardSection',this)"
>
Dashboard
</button>

<button
class="sideBtn"
onclick="showSection('clientsSection',this)"
>
Clients
</button>

<button
class="sideBtn"
onclick="showSection('feedSection',this)"
>
Feed
</button>

<button
class="sideBtn"
onclick="showSection('managerSection',this)"
>
Managers
</button>

<button
class="sideBtn"
onclick="showSection('recordsSection',this)"
>
Records
</button>

<button
class="sideBtn"
onclick="showSection('remarksSection',this)"
>
Remarks
</button>

<button
class="sideBtn"
onclick="logout()"
>
Logout
</button>

</div>

<!-- MAIN -->

<div class="main">

<!-- DASHBOARD -->

<div id="dashboardSection">

<div class="stats">

<div class="stat">
<h3>Revenue</h3>
<p id="revenue">₹0</p>
</div>

<div class="stat">
<h3>Expense</h3>
<p id="expense">₹0</p>
</div>

<div class="stat">
<h3>Profit</h3>
<p id="profit">₹0</p>
</div>

<div class="stat">
<h3>Total Milk</h3>
<p id="milk">0L</p>
</div>

</div>

<div class="dashboardGrid">

<!-- MAIN CHART -->

<div class="chartCard">

<h2>
Milk Production
</h2>

<canvas id="milkChart"></canvas>

</div>

<!-- SMALL CHARTS -->

<div class="smallCharts">

<div class="chartCard">

<h2>
Discarded Milk
</h2>

<canvas id="discardChart"></canvas>

</div>

<div class="chartCard">

<h2>
Calf Average
</h2>

<canvas id="calfChart"></canvas>

</div>

<div class="chartCard">

<h2>
Staff Average
</h2>

<canvas id="staffChart"></canvas>

</div>

</div>

</div>

</div>

<script>

if(!localStorage.getItem("username")){

    window.location = "/";
}

let milkChart;
let discardChart;
let calfChart;
let staffChart;

function logout(){

    localStorage.clear();

    window.location="/";
}

async function loadDashboard(){

    const res =
    await fetch("/dashboard");

    const d =
    await res.json();

    document.getElementById(
        "revenue"
    ).innerText =
    "₹" +
    Number(
        d.totalRevenue || 0
    ).toFixed(2);

    document.getElementById(
        "expense"
    ).innerText =
    "₹" +
    Number(
        d.totalExpense || 0
    ).toFixed(2);

    document.getElementById(
        "profit"
    ).innerText =
    "₹" +
    Number(
        d.totalProfit || 0
    ).toFixed(2);

    document.getElementById(
        "milk"
    ).innerText =
    Number(
        d.totalMilk || 0
    ).toFixed(1) + "L";

    // MAIN CHART

    if(milkChart){
        milkChart.destroy();
    }

    milkChart =
    new Chart(

        document.getElementById(
            "milkChart"
        ),

        {

            type:"line",

            data:{

                labels:["Milk"],

                datasets:[{

                    label:
                    "Milk Production",

                    data:[
                        d.totalMilk || 0
                    ],

                    borderColor:"#8b5cf6",

                    backgroundColor:
                    "rgba(139,92,246,0.2)",

                    fill:true,

                    tension:0.4
                }]
            },

            options:{

                responsive:true,

                maintainAspectRatio:false,

                plugins:{
                    legend:{
                        labels:{
                            color:"white"
                        }
                    }
                },

                scales:{

                    x:{
                        ticks:{
                            color:"white"
                        }
                    },

                    y:{
                        ticks:{
                            color:"white"
                        }
                    }
                }
            }
        }
    );

    // DISCARD

    if(discardChart){
        discardChart.destroy();
    }

    discardChart =
    new Chart(

        document.getElementById(
            "discardChart"
        ),

        {

            type:"doughnut",

            data:{

                labels:["Discard"],

                datasets:[{

                    data:[
                        d.totalDiscard || 0
                    ],

                    backgroundColor:[
                        "#ef4444"
                    ]
                }]
            }
        }
    );

    // CALF

    if(calfChart){
        calfChart.destroy();
    }

    calfChart =
    new Chart(

        document.getElementById(
            "calfChart"
        ),

        {

            type:"bar",

            data:{

                labels:["Calf Avg"],

                datasets:[{

                    data:[
                        d.calfAverage || 0
                    ],

                    backgroundColor:"#06b6d4"
                }]
            }
        }
    );

    // STAFF

    if(staffChart){
        staffChart.destroy();
    }

    staffChart =
    new Chart(

        document.getElementById(
            "staffChart"
        ),

        {

            type:"bar",

            data:{

                labels:["Staff Avg"],

                datasets:[{

                    data:[
                        d.staffAverage || 0
                    ],

                    backgroundColor:"#8b5cf6"
                }]
            }
        }
    );
}

loadDashboard();
// ======================
// SECTION SWITCH
// ======================

function showSection(id,btn){

    document
    .querySelectorAll(".main > div")
    .forEach(sec => {

        sec.classList.add("hidden");
    });

    document
    .getElementById(id)
    .classList.remove("hidden");

    document
    .querySelectorAll(".sideBtn")
    .forEach(b => {

        b.classList.remove("activeBtn");
    });

    btn.classList.add("activeBtn");
}

// ======================
// CLIENTS
// ======================

async function createClient(){

    const data = {

        name:
        document.getElementById(
            "clientName"
        ).value,

        pricePerLiter:Number(

            document.getElementById(
                "clientPrice"
            ).value

        ) || 0
    };

    await fetch("/create-client",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify(data)
    });

    loadClients();
}

async function loadClients(){

    const res =
    await fetch("/clients");

    const clients =
    await res.json();

    const div =
    document.getElementById(
        "clientList"
    );

    if(!div) return;

    div.innerHTML = "";

    clients.forEach(c => {

        div.innerHTML += `

        <div class="userCard">

        <h3>${c.name}</h3>

        <p>
        ₹${c.pricePerLiter}/L
        </p>

        </div>
        `;
    });
}

loadClients();

</script>

<!-- CLIENTS -->

<div
id="clientsSection"
class="hidden"
>

<div class="card">

<h2>
Create Client
</h2>

<div class="grid">

<input
type="text"
id="clientName"
placeholder="Client Name"
/>

<input
type="number"
id="clientPrice"
placeholder="Price Per Liter"
/>

</div>

<button onclick="createClient()">
Create Client
</button>

</div>

<div class="card">

<h2>
Client List
</h2>

<div id="clientList"></div>

</div>

</div>

</body>

</html>
</body>

</html>
