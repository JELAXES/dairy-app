<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kshiralaya Admin</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial,sans-serif;

    background:#0f172a;

    color:white;

    display:flex;

    min-height:100vh;
}

/* SIDEBAR */

.sidebar{

    width:260px;

    background:#111827;

    padding:20px;

    display:flex;

    flex-direction:column;
}

.logoBox{

    text-align:center;

    margin-bottom:30px;
}

.logoBox img{

    width:140px;

    border-radius:20px;

    margin-bottom:10px;

    box-shadow:
    0 0 25px rgba(255,255,255,0.1);
}

.logoText{

    font-size:28px;

    font-weight:bold;

    background:linear-gradient(
        90deg,
        #60a5fa,
        #a855f7
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.sideBtn{

    width:100%;

    padding:15px;

    margin-bottom:15px;

    border:none;

    border-radius:12px;

    background:#1e293b;

    color:white;

    cursor:pointer;

    text-align:left;

    font-size:15px;

    transition:0.2s;
}

.sideBtn:hover{

    transform:scale(1.02);

    background:#2563eb;
}

.activeBtn{

    background:linear-gradient(
        90deg,
        #3b82f6,
        #8b5cf6
    );
}

/* MAIN */

.main{

    flex:1;

    padding:25px;

    overflow-y:auto;
}

.card{

    background:#111827;

    border-radius:18px;

    padding:20px;

    margin-bottom:25px;

    box-shadow:
    0 0 25px rgba(0,0,0,0.3);
}

.stats{

    display:grid;

    grid-template-columns:
    repeat(4,1fr);

    gap:15px;
}

.stat{

    background:#1e293b;

    padding:20px;

    border-radius:15px;

    text-align:center;
}

.stat h3{

    color:#94a3b8;

    margin-bottom:10px;
}

.stat p{

    font-size:24px;

    font-weight:bold;
}

.grid{

    display:grid;

    grid-template-columns:
    1fr 1fr;

    gap:20px;
}

input{

    width:100%;

    padding:14px;

    margin-top:12px;

    border:none;

    border-radius:12px;

    background:#1e293b;

    color:white;
}

button{

    width:100%;

    padding:14px;

    margin-top:18px;

    border:none;

    border-radius:12px;

    background:linear-gradient(
        90deg,
        #3b82f6,
        #8b5cf6
    );

    color:white;

    cursor:pointer;

    font-size:16px;
}

table{

    width:100%;

    border-collapse:collapse;

    margin-top:20px;
}

th,td{

    padding:14px;

    text-align:center;

    border-bottom:1px solid #374151;
}

th{

    color:#60a5fa;
}

canvas{

    background:#1e293b;

    border-radius:15px;

    padding:15px;

    max-height:250px !important;
}

.hidden{

    display:none;
}

.userCard{

    background:#1e293b;

    padding:15px;

    border-radius:12px;

    margin-top:15px;
}

@media(max-width:900px){

    body{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
    }

    .stats{
        grid-template-columns:
        1fr 1fr;
    }

    .grid{
        grid-template-columns:
        1fr;
    }
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logoBox">

<img src="logo.png">

<div class="logoText">
Kshiralaya
</div>

</div>

<button
class="sideBtn activeBtn"
onclick="showSection('dashboardSection',this)"
>
Dashboard
</button>

<button
class="sideBtn"
onclick="showSection('clientsSection',this)"
>
Clients
</button>

<button
class="sideBtn"
onclick="showSection('feedSection',this)"
>
Feed
</button>

<button
class="sideBtn"
onclick="showSection('monthlySection',this)"
>
Monthly
</button>

<button
class="sideBtn"
onclick="showSection('managerSection',this)"
>
Managers
</button>

<button
class="sideBtn"
onclick="showSection('recordsSection',this)"
>
Records
</button>

<button
class="sideBtn"
onclick="logout()"
>
Logout
</button>

</div>

<!-- MAIN -->

<div class="main">

<!-- DASHBOARD -->

<div id="dashboardSection">

<div class="stats">

<div class="stat">
<h3>Revenue</h3>
<p id="revenue">₹0</p>
</div>

<div class="stat">
<h3>Expense</h3>
<p id="expense">₹0</p>
</div>

<div class="stat">
<h3>Profit</h3>
<p id="profit">₹0</p>
</div>

<div class="stat">
<h3>Total Milk</h3>
<p id="milk">0L</p>
</div>

</div>

<br>

<div class="card">

<h2>Milk Analytics</h2>

<br>

<canvas id="milkChart"></canvas>

</div>

</div>

<!-- CLIENTS -->

<div
id="clientsSection"
class="hidden"
>

<div class="card">

<h2>Create Client</h2>

<input
type="text"
id="clientName"
placeholder="Client Name"
>

<input
type="number"
id="clientPrice"
placeholder="Price Per Liter"
>

<button onclick="createClient()">
Create Client
</button>

</div>

<div class="card">

<h2>Client List</h2>

<div id="clientList"></div>

</div>

</div>

<!-- FEED -->

<div
id="feedSection"
class="hidden"
>

<div class="card">

<h2>Feed Management</h2>

<div class="grid">

<div>

<input
type="text"
id="feedName"
placeholder="Feed Name"
>

</div>

<div>

<input
type="number"
id="feedQty"
placeholder="Quantity"
>

</div>

<div>

<input
type="number"
id="feedCost"
placeholder="Cost"
>

</div>

<div>

<input
type="date"
id="feedDate"
>

</div>

</div>

<button onclick="saveFeed()">
Save Feed
</button>

</div>

<div class="card">

<h2>Feed Records</h2>

<table>

<thead>

<tr>

<th>Feed</th>
<th>Quantity</th>
<th>Cost</th>
<th>Date</th>

</tr>

</thead>

<tbody id="feedRecords">
</tbody>

</table>

</div>

</div>

<!-- MONTHLY -->

<div
id="monthlySection"
class="hidden"
>

<div class="card">

<h2>Monthly Settings</h2>

<input
type="number"
id="monthlyExpense"
placeholder="Monthly Expense"
>

<button onclick="saveMonthly()">
Save Monthly
</button>

</div>

</div>

<!-- MANAGERS -->

<div
id="managerSection"
class="hidden"
>

<div class="card">

<h2>Pending Managers</h2>

<div id="pendingUsers"></div>

</div>

</div>

<!-- RECORDS -->

<div
id="recordsSection"
class="hidden"
>

<div class="card">

<h2>Milk Records</h2>

<table>

<thead>

<tr>

<th>Date</th>
<th>Client</th>
<th>Manager</th>
<th>Total</th>
<th>Discard</th>

</tr>

</thead>

<tbody id="records">
</tbody>

</table>

</div>

</div>

</div>

<script>

let milkChart;

// ======================
// SWITCH SECTION
// ======================

function showSection(id,btn){

    document
    .querySelectorAll(".main > div")
    .forEach(sec => {

        sec.classList.add(
            "hidden"
        );
    });

    document
    .getElementById(id)
    .classList.remove(
        "hidden"
    );

    document
    .querySelectorAll(".sideBtn")
    .forEach(b => {

        b.classList.remove(
            "activeBtn"
        );
    });

    btn.classList.add(
        "activeBtn"
    );

    if(id === "feedSection"){
        loadFeeds();
    }

    if(id === "dashboardSection"){
        loadDashboard();
    }

    if(id === "clientsSection"){
        loadClients();
    }

    if(id === "managerSection"){
        loadPendingUsers();
    }
}

// ======================
// LOGOUT
// ======================

function logout(){

    localStorage.clear();

    window.location = "/";
}

// ======================
// FEEDS
// ======================

async function saveFeed(){

    const data = {

        feedName:
        document.getElementById(
            "feedName"
        ).value,

        quantity:Number(

            document.getElementById(
                "feedQty"
            ).value

        ),

        cost:Number(

            document.getElementById(
                "feedCost"
            ).value

        ),

        date:
        document.getElementById(
            "feedDate"
        ).value
    };

    await fetch("/save-feed",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify(data)
    });

    alert("Feed Saved ✅");

    loadFeeds();
}

async function loadFeeds(){

    const res =
    await fetch("/feeds");

    const feeds =
    await res.json();

    const table =
    document.getElementById(
        "feedRecords"
    );

    table.innerHTML = "";

    if(feeds.length === 0){

        table.innerHTML = `

        <tr>

        <td colspan="4">

        No feed records found

        </td>

        </tr>
        `;

        return;
    }

    feeds.forEach(f => {

        table.innerHTML += `

        <tr>

        <td>${f.feedName}</td>

        <td>${f.quantity}</td>

        <td>₹${f.cost}</td>

        <td>${f.date}</td>

        </tr>
        `;
    });
}

// ======================
// CLIENTS
// ======================

async function createClient(){

    const data = {

        name:
        document.getElementById(
            "clientName"
        ).value,

        pricePerLiter:Number(

            document.getElementById(
                "clientPrice"
            ).value

        )
    };

    await fetch("/create-client",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify(data)
    });

    alert("Client Created ✅");

    loadClients();
}

async function loadClients(){

    const res =
    await fetch("/clients");

    const clients =
    await res.json();

    const div =
    document.getElementById(
        "clientList"
    );

    div.innerHTML = "";

    clients.forEach(c => {

        div.innerHTML += `

        <div class="userCard">

        <h3>${c.name}</h3>

        <p>
        ₹${c.pricePerLiter}/L
        </p>

        </div>
        `;
    });
}

// ======================
// MONTHLY
// ======================

async function saveMonthly(){

    const data = {

        type:"monthly",

        month:
        new Date()
        .toISOString()
        .slice(0,7),

        monthlyExpense:Number(

            document.getElementById(
                "monthlyExpense"
            ).value

        )
    };

    await fetch("/add",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify(data)
    });

    alert("Monthly Saved ✅");
}

// ======================
// USERS
// ======================

async function loadPendingUsers(){

    const res =
    await fetch("/pending-users");

    const users =
    await res.json();

    const div =
    document.getElementById(
        "pendingUsers"
    );

    div.innerHTML = "";

    users.forEach(user => {

        div.innerHTML += `

        <div class="userCard">

        <h3>${user.username}</h3>

        <button
        onclick="approveUser('${user._id}')"
        >
        Approve
        </button>

        </div>
        `;
    });
}

async function approveUser(id){

    await fetch("/approve-user",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({
            id
        })
    });

    alert("Approved ✅");

    loadPendingUsers();
}

// ======================
// DASHBOARD
// ======================

async function loadDashboard(){

    const res =
    await fetch("/dashboard");

    const d =
    await res.json();

    document.getElementById(
        "revenue"
    ).innerText =
    "₹" +
    Number(
        d.totalRevenue || 0
    ).toFixed(2);

    document.getElementById(
        "expense"
    ).innerText =
    "₹" +
    Number(
        d.totalExpense || 0
    ).toFixed(2);

    document.getElementById(
        "profit"
    ).innerText =
    "₹" +
    Number(
        d.totalProfit || 0
    ).toFixed(2);

    document.getElementById(
        "milk"
    ).innerText =
    Number(
        d.totalMilk || 0
    ).toFixed(1) + "L";

    if(milkChart){
        milkChart.destroy();
    }

    milkChart =
    new Chart(

        document.getElementById(
            "milkChart"
        ),

        {

            type:"line",

            data:{

                labels:["Milk"],

                datasets:[{

                    label:
                    "Milk Production",

                    data:[
                        d.totalMilk || 0
                    ],

                    borderColor:"#60a5fa",

                    tension:0.4
                }]
            }
        });
}

// ======================
// INIT
// ======================

loadDashboard();
loadFeeds();
loadClients();
loadPendingUsers();

</script>

</body>
</html>
