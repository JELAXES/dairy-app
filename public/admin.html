<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Kshiralaya Admin
</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial,sans-serif;

    background:#0f172a;

    color:white;

    display:flex;

    min-height:100vh;
}

/* SIDEBAR */

.sidebar{

    width:260px;

    background:#111827;

    padding:20px;

    display:flex;

    flex-direction:column;
}

.logoBox{

    text-align:center;

    margin-bottom:30px;
}

.logoBox img{

    width:150px;

    border-radius:20px;

    margin-bottom:10px;

    box-shadow:
    0 0 25px rgba(255,255,255,0.08);
}

.logoText{

    font-size:28px;

    font-weight:bold;

    background:linear-gradient(
        90deg,
        #60a5fa,
        #a855f7
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.sideBtn{

    width:100%;

    padding:15px;

    margin-bottom:15px;

    border:none;

    border-radius:12px;

    background:#1e293b;

    color:white;

    cursor:pointer;

    text-align:left;

    font-size:15px;

    transition:0.2s;
}

.sideBtn:hover{

    transform:scale(1.02);

    background:#2563eb;
}

.activeBtn{

    background:linear-gradient(
        90deg,
        #3b82f6,
        #8b5cf6
    );
}

/* MAIN */

.main{

    flex:1;

    padding:25px;

    overflow-y:auto;
}

.card{

    background:#111827;

    border-radius:18px;

    padding:20px;

    margin-bottom:25px;

    box-shadow:
    0 0 25px rgba(0,0,0,0.3);
}

.stats{

    display:grid;

    grid-template-columns:
    repeat(4,1fr);

    gap:15px;
}

.stat{

    background:#1e293b;

    padding:20px;

    border-radius:15px;

    text-align:center;
}

.stat h3{

    color:#94a3b8;

    margin-bottom:10px;
}

.stat p{

    font-size:24px;

    font-weight:bold;
}

.grid{

    display:grid;

    grid-template-columns:
    1fr 1fr;

    gap:20px;
}

input{

    width:100%;

    padding:14px;

    margin-top:12px;

    border:none;

    border-radius:12px;

    background:#1e293b;

    color:white;
}

button{

    width:100%;

    padding:14px;

    margin-top:18px;

    border:none;

    border-radius:12px;

    background:linear-gradient(
        90deg,
        #3b82f6,
        #8b5cf6
    );

    color:white;

    cursor:pointer;

    font-size:16px;
}

table{

    width:100%;

    border-collapse:collapse;

    margin-top:20px;
}

th,td{

    padding:14px;

    text-align:center;

    border-bottom:1px solid #374151;
}

th{

    color:#60a5fa;
}

.hidden{

    display:none;
}

.userCard{

    background:#1e293b;

    padding:15px;

    border-radius:12px;

    margin-top:15px;
}

@media(max-width:900px){

    body{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
    }

    .stats{
        grid-template-columns:
        1fr 1fr;
    }

    .grid{
        grid-template-columns:
        1fr;
    }
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logoBox">

<img src="logo.png">

<div class="logoText">
Kshiralaya
</div>

</div>

<button
class="sideBtn activeBtn"
onclick="showSection('dashboardSection',this)"
>
Dashboard
</button>

<button
class="sideBtn"
onclick="showSection('feedSection',this)"
>
Feed
</button>

<button
class="sideBtn"
onclick="logout()"
>
Logout
</button>

</div>

<!-- MAIN -->

<div class="main">

<!-- DASHBOARD -->

<div id="dashboardSection">

<div class="stats">

<div class="stat">

<h3>
Revenue
</h3>

<p id="revenue">
₹0
</p>

</div>

<div class="stat">

<h3>
Expense
</h3>

<p id="expense">
₹0
</p>

</div>

<div class="stat">

<h3>
Profit
</h3>

<p id="profit">
₹0
</p>

</div>

<div class="stat">

<h3>
Total Milk
</h3>

<p id="milk">
0L
</p>

</div>

</div>

</div>

<!-- FEED SECTION -->

<div
id="feedSection"
class="hidden"
>

<div class="card">

<h2>
🌾 Feed Management
</h2>

<div class="grid">

<div>

<input
type="text"
id="feedName"
placeholder="Feed Name"
/>

</div>

<div>

<input
type="number"
id="feedQty"
placeholder="Quantity"
/>

</div>

<div>

<input
type="number"
id="feedCost"
placeholder="Cost"
/>

</div>

<div>

<input
type="date"
id="feedDate"
/>

</div>

</div>

<button onclick="saveFeed()">
Save Feed
</button>

</div>

<div class="card">

<h2>
📋 Feed Records
</h2>

<table>

<thead>

<tr>

<th>
Feed
</th>

<th>
Quantity
</th>

<th>
Cost
</th>

<th>
Date
</th>

</tr>

</thead>

<tbody id="feedRecords">

</tbody>

</table>

</div>

</div>

</div>

<script>

// ======================
// SWITCH SECTION
// ======================

function showSection(id,btn){

    document
    .querySelectorAll(".main > div")
    .forEach(sec => {

        sec.classList.add(
            "hidden"
        );
    });

    document
    .getElementById(id)
    .classList.remove(
        "hidden"
    );

    document
    .querySelectorAll(".sideBtn")
    .forEach(b => {

        b.classList.remove(
            "activeBtn"
        );
    });

    btn.classList.add(
        "activeBtn"
    );

    if(id === "feedSection"){

        loadFeeds();
    }
}

// ======================
// LOGOUT
// ======================

function logout(){

    localStorage.clear();

    window.location = "/";
}

// ======================
// SAVE FEED
// ======================

async function saveFeed(){

    try{

        const data = {

            feedName:
            document.getElementById(
                "feedName"
            ).value,

            quantity:Number(

                document.getElementById(
                    "feedQty"
                ).value

            ) || 0,

            cost:Number(

                document.getElementById(
                    "feedCost"
                ).value

            ) || 0,

            date:
            document.getElementById(
                "feedDate"
            ).value
        };

        console.log(
            "SENDING:",
            data
        );

        const res =
        await fetch("/save-feed",{

            method:"POST",

            headers:{
                "Content-Type":
                "application/json"
            },

            body:JSON.stringify(data)
        });

        const result =
        await res.json();

        console.log(
            "RESULT:",
            result
        );

        if(result.success){

            alert(
                "Feed Saved ✅"
            );

            loadFeeds();

        }else{

            alert(
                "Feed save failed"
            );
        }

    }catch(err){

        console.log(err);

        alert(
            "Feed Error ❌"
        );
    }
}

// ======================
// LOAD FEEDS
// ======================

async function loadFeeds(){

    try{

        const res =
        await fetch("/feeds");

        const feeds =
        await res.json();

        console.log(
            "FEEDS:",
            feeds
        );

        const tbody =
        document.getElementById(
            "feedRecords"
        );

        tbody.innerHTML = "";

        if(!feeds.length){

            tbody.innerHTML = `

            <tr>

            <td colspan="4">

            No feed records found

            </td>

            </tr>
            `;

            return;
        }

        feeds.forEach(feed => {

            tbody.innerHTML += `

            <tr>

                <td>
                ${feed.feedName || ""}
                </td>

                <td>
                ${feed.quantity || 0}
                </td>

                <td>
                ₹${feed.cost || 0}
                </td>

                <td>
                ${feed.date || ""}
                </td>

            </tr>
            `;
        });

    }catch(err){

        console.log(err);
    }
}

// ======================
// LOAD DASHBOARD
// ======================

async function loadDashboard(){

    try{

        const res =
        await fetch("/dashboard");

        const d =
        await res.json();

        document.getElementById(
            "revenue"
        ).innerText =
        "₹" +
        Number(
            d.totalRevenue || 0
        ).toFixed(2);

        document.getElementById(
            "expense"
        ).innerText =
        "₹" +
        Number(
            d.totalExpense || 0
        ).toFixed(2);

        document.getElementById(
            "profit"
        ).innerText =
        "₹" +
        Number(
            d.totalProfit || 0
        ).toFixed(2);

        document.getElementById(
            "milk"
        ).innerText =
        Number(
            d.totalMilk || 0
        ).toFixed(1) + "L";

    }catch(err){

        console.log(err);
    }
}

// ======================
// INIT
// ======================

loadDashboard();

loadFeeds();

</script>

</body>

</html>
