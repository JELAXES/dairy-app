<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family:Arial;
    background:#f1f5f9;
    margin:0;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.stats{
    display:grid;
    grid-template-columns:1fr 1fr 1fr 1fr;
    gap:15px;
}

.stat{
    background:#dbeafe;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

input,select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

th{
    background:#2563eb;
    color:white;
}

canvas{
    background:white;
    border-radius:15px;
    padding:10px;
}

.userCard{
    background:#f8fafc;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}

@media(max-width:900px){

    .grid{
        grid-template-columns:1fr;
    }

    .stats{
        grid-template-columns:1fr 1fr;
    }
}

</style>

</head>

<body>

<script>

if(
    localStorage.getItem("role")
    !== "admin"
){
    window.location = "/";
}

</script>

<h1>🐄 Dairy ERP Admin Panel</h1>

<!-- MONTH SELECT -->

<div class="card">

<h2>Select Month</h2>

<input
type="month"
id="selectedMonth"
onchange="loadDashboard()"
>

</div>

<!-- STATS -->

<div class="card">

<h2>Farm Analytics</h2>

<div class="stats">

<div class="stat">
<h3>Expense</h3>
<p id="expense">₹0</p>
</div>

<div class="stat">
<h3>Revenue</h3>
<p id="revenue">₹0</p>
</div>

<div class="stat">
<h3>Profit</h3>
<p id="profit">₹0</p>
</div>

<div class="stat">
<h3>Total Milk</h3>
<p id="milk">0 L</p>
</div>

</div>

<br>

<div class="stats">

<div class="stat">
<h3>AM Milk</h3>
<p id="amMilk">0 L</p>
</div>

<div class="stat">
<h3>PM Milk</h3>
<p id="pmMilk">0 L</p>
</div>

<div class="stat">
<h3>Discarded</h3>
<p id="discardMilk">0 L</p>
</div>

<div class="stat">
<h3>Milk Price</h3>
<p id="milkPriceCard">₹0</p>
</div>

</div>

<br><br>

<canvas id="milkChart"></canvas>

</div>

<!-- MONTHLY SETTINGS -->

<div class="card">

<h2>Monthly Settings</h2>

<div class="grid">

<div>
<label>Milk Price Per Liter</label>
<input
type="number"
id="milkPrice"
>
</div>

<div>
<label>Total Monthly Expense</label>
<input
type="number"
id="monthlyExpense"
>
</div>

</div>

<button onclick="saveMonthly()">
Save Monthly Settings
</button>

</div>

<!-- CREATE CLIENT -->

<div class="card">

<h2>Create Client</h2>

<input
type="text"
id="clientName"
placeholder="Client Name"
>

<button onclick="createClient()">
Create Client
</button>

<h3>Clients</h3>

<div id="clientList">
</div>

</div>

<!-- PENDING USERS -->

<div class="card">

<h2>Pending Worker Requests</h2>

<div id="pendingUsers">
</div>

</div>

<!-- RECORDS -->

<div class="card">

<h2>Milk Records</h2>

<table>

<thead>

<tr>

<th>Date</th>
<th>Client</th>
<th>AM</th>
<th>PM</th>
<th>Discard</th>
<th>Total</th>
<th>Cows</th>

</tr>

</thead>

<tbody id="records">
</tbody>

</table>

</div>

<script>

let milkChart;

// ======================
// LOAD DASHBOARD
// ======================

async function loadDashboard(){

    const month =
        document.getElementById(
            "selectedMonth"
        ).value ||

        new Date()
        .toISOString()
        .slice(0,7);

    const res =
        await fetch(
            "/dashboard?month=" +
            month
        );

    const d =
        await res.json();

    // STATS

    document.getElementById(
        "expense"
    ).innerText =
        "₹" +
        Number(
            d.totalExpense || 0
        ).toFixed(2);

    document.getElementById(
        "revenue"
    ).innerText =
        "₹" +
        Number(
            d.totalRevenue || 0
        ).toFixed(2);

    document.getElementById(
        "profit"
    ).innerText =
        "₹" +
        Number(
            d.totalProfit || 0
        ).toFixed(2);

    document.getElementById(
        "milk"
    ).innerText =
        Number(
            d.totalMilk || 0
        ).toFixed(1) + " L";

    document.getElementById(
        "amMilk"
    ).innerText =
        Number(
            d.totalAMMilk || 0
        ).toFixed(1) + " L";

    document.getElementById(
        "pmMilk"
    ).innerText =
        Number(
            d.totalPMMilk || 0
        ).toFixed(1) + " L";

    document.getElementById(
        "discardMilk"
    ).innerText =
        Number(
            d.totalDiscardedMilk || 0
        ).toFixed(1) + " L";

    document.getElementById(
        "milkPriceCard"
    ).innerText =
        "₹" +
        Number(
            d.milkPrice || 0
        );

    // LOAD MONTHLY SETTINGS

    document.getElementById(
        "milkPrice"
    ).value =
        d.monthlySettings
        ?.milkPrice || "";

    document.getElementById(
        "monthlyExpense"
    ).value =
        d.monthlySettings
        ?.monthlyExpense || "";

    // RECORDS

    const table =
        document.getElementById(
            "records"
        );

    table.innerHTML = "";

    const labels = [];
    const milkData = [];

    (d.records || []).forEach(r => {

        labels.push(r.date);

        milkData.push(
            r.dailyMilk
        );

        table.innerHTML += `

        <tr>

        <td>${r.date || "-"}</td>

        <td>${r.client || "-"}</td>

        <td>${Number(
            r.milkAM || 0
        ).toFixed(1)}</td>

        <td>${Number(
            r.milkPM || 0
        ).toFixed(1)}</td>

        <td>${Number(
            r.discardedMilk || 0
        ).toFixed(1)}</td>

        <td>${Number(
            r.dailyMilk || 0
        ).toFixed(1)}</td>

        <td>${Number(
            r.cows || 0
        )}</td>

        </tr>
        `;
    });

    // CHART

    if(milkChart){
        milkChart.destroy();
    }

    milkChart =
        new Chart(

        document.getElementById(
            "milkChart"
        ),

        {

            type:"line",

            data:{

                labels:labels,

                datasets:[{

                    label:"Milk Production",

                    data:milkData
                }]
            }
        });
}

// ======================
// SAVE MONTHLY
// ======================

async function saveMonthly(){

    const month =
        document.getElementById(
            "selectedMonth"
        ).value ||

        new Date()
        .toISOString()
        .slice(0,7);

    const data = {

        type:"monthly",

        month:month,

        milkPrice:Number(

            document.getElementById(
                "milkPrice"
            ).value

        ) || 0,

        monthlyExpense:Number(

            document.getElementById(
                "monthlyExpense"
            ).value

        ) || 0
    };

    await fetch("/add",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify(data)
    });

    alert(
        "Monthly Settings Saved ✅"
    );

    loadDashboard();
}

// ======================
// LOAD PENDING USERS
// ======================

async function loadPendingUsers(){

    const res =
        await fetch(
            "/pending-users"
        );

    const users =
        await res.json();

    const div =
        document.getElementById(
            "pendingUsers"
        );

    div.innerHTML = "";

    users.forEach(user => {

        div.innerHTML += `

        <div class="userCard">

        <h3>${user.username}</h3>

        <p>

        Requested Permissions:
        ${user.permissions.join(", ")}

        </p>

        <button
        onclick="approveUser('${user._id}')"
        >

        Approve

        </button>

        </div>
        `;
    });
}

// ======================
// APPROVE USER
// ======================

async function approveUser(id){

    await fetch(
        "/approve-user",

        {

            method:"POST",

            headers:{
                "Content-Type":
                "application/json"
            },

            body:JSON.stringify({
                id
            })
        }
    );

    alert(
        "User Approved ✅"
    );

    loadPendingUsers();
}

// ======================
// CREATE CLIENT
// ======================

async function createClient(){

    const name =
        document.getElementById(
            "clientName"
        ).value;

    if(!name){

        return alert(
            "Enter Client Name"
        );
    }

    await fetch(
        "/create-client",

        {

            method:"POST",

            headers:{
                "Content-Type":
                "application/json"
            },

            body:JSON.stringify({

                name:name,

                createdBy:
                    localStorage.getItem(
                        "username"
                    )
            })
        }
    );

    document.getElementById(
        "clientName"
    ).value = "";

    alert(
        "Client Created ✅"
    );

    loadClients();
}

// ======================
// LOAD CLIENTS
// ======================

async function loadClients(){

    const res =
        await fetch("/clients");

    const clients =
        await res.json();

    const div =
        document.getElementById(
            "clientList"
        );

    div.innerHTML = "";

    clients.forEach(c => {

        div.innerHTML += `

        <div class="userCard">

        <h3>${c.name}</h3>

        <p>
        Created By:
        ${c.createdBy}
        </p>

        </div>
        `;
    });
}

// ======================
// INIT
// ======================

document.getElementById(
    "selectedMonth"
).value =
    new Date()
    .toISOString()
    .slice(0,7);

loadDashboard();

loadPendingUsers();

loadClients();

</script>

</body>
</html>
